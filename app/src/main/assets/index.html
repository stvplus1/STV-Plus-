
<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STv+ Premium Experience</title>
    <script src="https://ssl.p.jwpcdn.com/player/v/8.21.0/jwplayer.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { 
            --accent: #ff3333; 
            --bg: #080808; 
            --glass: rgba(10, 10, 10, 0.8); 
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body { margin: 0; background: var(--bg); color: #efefef; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        .player-wrapper { position: relative; width: 100vw; height: 100vh; overflow: hidden; background: #000; }

        .side-menu {
            position: absolute; top: 0; right: -320px; width: 320px; height: 100%;
            background: var(--glass); 
            backdrop-filter: blur(25px); 
            z-index: 2000;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-left: 1px solid rgba(255,255,255,0.1); 
            display: flex; flex-direction: column;
        }
        .side-menu.active { right: 0; }

        .menu-header { padding: 30px 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-header h2 { margin: 0; font-size: 20px; color: var(--accent); letter-spacing: 3px; font-weight: 900; }

        .groups-container { display: flex; gap: 10px; overflow-x: auto; padding: 15px; scrollbar-width: none; }
        .groups-container::-webkit-scrollbar { display: none; }
        .group-item { padding: 8px 18px; background: rgba(255,255,255,0.1); border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s; border: 1px solid rgba(255,255,255,0.05); }
        .group-item.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 4px 15px rgba(255, 51, 51, 0.4); }

        .channel-list { flex: 1; overflow-y: auto; padding: 15px; }
        .channel-item { display: flex; align-items: center; padding: 12px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: all 0.25s; background: var(--card-bg); border: 1px solid transparent; }
        .channel-item.focused { background: rgba(255, 51, 51, 0.25) !important; border: 1px solid var(--accent); transform: scale(1.02); }

        .channel-logo { width: 55px; height: 40px; background: rgba(0,0,0,0.5); border-radius: 8px; margin-left: 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .channel-logo img { width: 100%; height: 100%; object-fit: contain; }
        .channel-name { font-size: 14px; font-weight: 600; flex: 1; text-align: right; }
        .ch-id { color: var(--accent); margin-left: 8px; font-weight: bold; font-size: 12px; }

        .overlay-ui { position: absolute; bottom: 0; right: 0; width: 100%; padding: 50px 40px; background: linear-gradient(to top, rgba(0,0,0,1), transparent); z-index: 1000; pointer-events: none; opacity: 0; transition: 0.6s; display: flex; align-items: flex-end; }
        .overlay-ui.visible { opacity: 1; }
        .ch-display { display: flex; align-items: center; gap: 20px; flex-direction: row-reverse; }
        .ch-display-logo { width: 90px; height: 65px; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 12px; padding: 8px; border: 1px solid rgba(255, 255, 255, 0.2); }
        .ch-display-logo img { width: 100%; height: 100%; object-fit: contain; }
        .ch-display-info { text-align: right; }
        .ch-display-info h1 { margin: 0; font-size: 28px; font-weight: 800; color: #fff; }
        .live-tag { display: inline-flex; align-items: center; gap: 6px; background: var(--accent); padding: 3px 10px; border-radius: 5px; font-size: 11px; font-weight: bold; margin-top: 5px; }

        .num-indicator { position: absolute; top: 40px; left: 40px; background: var(--accent); padding: 15px 35px; border-radius: 15px; font-size: 40px; font-weight: 900; z-index: 3000; display: none; box-shadow: 0 0 30px rgba(255,0,0,0.5); }

        #jwplayer, #iframePlayer { width: 100% !important; height: 100% !important; border: none; }
        #iframePlayer { display: none; position: absolute; top: 0; left: 0; z-index: 1; }
    </style>
</head>
<body>

<div class="num-indicator" id="numBox"></div>

<div class="player-wrapper" id="mainWrapper">
    <div style="position:absolute; width:100%; height:100%; z-index:5;" id="touchLayer"></div>

    <div class="side-menu" id="sideMenu">
        <div class="menu-header"><h2>🅢𝐓✓+ PREMIUM</h2></div>
        <div class="groups-container" id="groupsBar"></div>
        <div class="channel-list" id="channelList"></div>
    </div>

    <div class="overlay-ui" id="overlayUI">
        <div class="ch-display">
            <div class="ch-display-logo" id="uiLogo"><img src="" alt=""></div>
            <div class="ch-display-info">
                <h1 id="uiName">بستلبا کەنالی...</h1>
                <div class="live-tag"><i class="fas fa-circle" style="font-size: 8px;"></i> ڕاستەوخۆ</div>
            </div>
        </div>
    </div>
    
    <div id="jwplayer"></div>
    <iframe id="iframePlayer" allowfullscreen></iframe>
</div>

<script>
    jwplayer.key = 'XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo';
    
    const m3uContent = `
#EXTINF:-1 tvg-logo="https://files.cdn-files-a.com/uploads/278563/800_68aeea3cabe7a.png" group-title="Kurdi", Quran Tv
https://raw.githubusercontent.com/stvplus1/KURDISH/refs/heads/main/Quran.m3u8
#EXTINF:-1 tvg-logo="https://upload.wikimedia.org/wikipedia/en/d/d0/MBC_Action_logo.png" group-title="Movies", MBC Action HD
https://ev-tcn-dxb-cdn.aws.playco.com/live/eds/MBC_Action_HD/DASH/MBC_Action_HD.mpd
#EXTINF:-1 tvg-logo="https://files.cdn-files-a.com/uploads/278563/800_6950fef58351e.png" group-title="Sport", ST✓ SPORT
https://raw.githubusercontent.com/stvplus1/LOCAL/refs/heads/main/beinKurd0.m3u8
#EXTINF:-1 tvg-logo="https://static.telewebion.com/channels/logos/sport1.png" group-title="Sport", Varzesh 1
https://telewebion.ir/embed/live/sport1
#EXTINF:-1 tvg-logo="https://static.telewebion.com/channels/logos/sport2.png" group-title="Sport", Varzesh 2
https://telewebion.ir/embed/live/sport2
#EXTINF:-1 tvg-logo="https://static.telewebion.com/channels/logos/sport3.png" group-title="Sport", Varzesh 3
https://telewebion.ir/embed/live/sport3
#EXTINF:-1 tvg-logo="https://files.cdn-files-a.com/uploads/278563/800_6950fef58351e.png" group-title="Kurdi", ST✓ One
https://raw.githubusercontent.com/stvplus1/LOCAL/refs/heads/main/StvMovies.m3u8
#EXTINF:-1 tvg-logo="https://www.appcreator24.com/srv/imgs/cards/o1641719_6763373.png" group-title="Kurdi", RUDAW HD
https://raw.githubusercontent.com/stvplus1/KURDISH/refs/heads/main/RudawD.m3u8`;

    let allChannels = [], filteredChannels = [], groups = ["هەمی"];
    let currentGroup = "هەمی", isMenuOpen = false, uiTimer, focusedIndex = 0;
    let lastTap = 0, numInput = "", numTimer;

    function init() {
        const lines = m3uContent.split('\n');
        let current = {};
        let chCount = 1;
        lines.forEach(line => {
            if (line.startsWith('#EXTINF:')) {
                current.originalName = line.split(',')[1]?.trim() || "Bê Nav";
                current.id = chCount++;
                current.logo = line.match(/tvg-logo="([^"]+)"/)?.[1] || "";
                current.group = line.match(/group-title="([^"]+)"/)?.[1]?.trim() || "Yên دی";
                if (!groups.includes(current.group)) groups.push(current.group);
            } else if (line.startsWith('http')) {
                current.url = line.trim();
                allChannels.push(current);
                current = {};
            }
        });
        renderGroups();
        filterByGroup("هەمی");
        if (allChannels.length > 0) playChannel(allChannels[0]);
    }

    function renderGroups() {
        const bar = document.getElementById('groupsBar');
        bar.innerHTML = groups.map(g => `<div class="group-item ${g===currentGroup?'active':''}" onclick="filterByGroup('${g}'); event.stopPropagation();">${g}</div>`).join('');
    }

    function filterByGroup(name) {
        currentGroup = name;
        renderGroups();
        filteredChannels = name === "هەمی" ? allChannels : allChannels.filter(c => c.group === name);
        focusedIndex = 0;
        renderChannels();
    }

    function renderChannels() {
        const list = document.getElementById('channelList');
        list.innerHTML = filteredChannels.map((ch, i) => `
            <div class="channel-item ${i === focusedIndex ? 'focused' : ''}" onclick="loadByIndex(${i}, true); event.stopPropagation();">
                <div class="channel-name">${ch.originalName} <span class="ch-id">${ch.id}</span></div>
                <div class="channel-logo"><img src="${ch.logo}" onerror="this.src='https://via.placeholder.com/50x38?text=TV'"></div>
            </div>`).join('');
        if(isMenuOpen) updateFocus();
    }

    function loadByIndex(i, close = false) {
        const ch = filteredChannels[i];
        if(!ch) return;
        playChannel(ch);
        focusedIndex = i;
        if (close) toggleMenu(false);
    }

    function playChannel(ch) {
        const jwContainer = document.getElementById('jwplayer');
        const iframePlayer = document.getElementById('iframePlayer');

        // پشکنیینا ئەگەر لینکێ Telewebion بیت
        if (ch.url.includes("telewebion.ir")) {
            jwplayer("jwplayer").stop();
            jwContainer.style.display = "none";
            iframePlayer.style.display = "block";
            iframePlayer.src = ch.url;
        } else {
            iframePlayer.style.display = "none";
            iframePlayer.src = "";
            jwContainer.style.display = "block";
            
            let setupConfig = {
                file: ch.url,
                autostart: true,
                width: "100%",
                height: "100%",
                stretching: "exactfit"
            };

            if (ch.originalName.includes("MBC Action")) {
                setupConfig.type = "dash";
                setupConfig.drm = {
                    clearkey: {
                        keyId: "d889ec7cb5cd8acb44f702726a56ae21",
                        key: "37be04cfb92f19ecd6074b976c1f3c54"
                    }
                };
            }
            jwplayer("jwplayer").setup(setupConfig);
        }
        
        document.getElementById('uiName').innerText = ch.originalName;
        document.getElementById('uiLogo').querySelector('img').src = ch.logo;
        showUI();
    }

    function toggleMenu(force) {
        isMenuOpen = force !== undefined ? force : !isMenuOpen;
        document.getElementById('sideMenu').classList.toggle('active', isMenuOpen);
        if(isMenuOpen) renderChannels();
    }

    function showUI() {
        const ui = document.getElementById('overlayUI');
        ui.classList.add('visible');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => ui.classList.remove('visible'), 4000);
    }

    function updateFocus() {
        const items = document.querySelectorAll('.channel-item');
        if (items[focusedIndex]) items[focusedIndex].scrollIntoView({ block: 'center', behavior: 'smooth' });
    }

    document.addEventListener('keydown', function(e) {
        if (/^\d$/.test(e.key)) {
            clearTimeout(numTimer);
            numInput += e.key;
            const box = document.getElementById('numBox');
            box.innerText = numInput; box.style.display = "block";
            numTimer = setTimeout(() => { 
                const ch = allChannels.find(c => c.id == parseInt(numInput));
                if(ch) playChannel(ch);
                numInput = ""; box.style.display = "none"; 
            }, 1200);
            return;
        }

        if (isMenuOpen) {
            if (e.keyCode === 38) { focusedIndex = (focusedIndex - 1 + filteredChannels.length) % filteredChannels.length; renderChannels(); }
            else if (e.keyCode === 40) { focusedIndex = (focusedIndex + 1 + filteredChannels.length) % filteredChannels.length; renderChannels(); }
            else if (e.keyCode === 13) { loadByIndex(focusedIndex, true); }
            else if (e.keyCode === 27 || e.keyCode === 8) { toggleMenu(false); }
        } else {
            if (e.keyCode === 13) toggleMenu(true);
            else if (e.keyCode === 38) { focusedIndex = (focusedIndex - 1 + filteredChannels.length) % filteredChannels.length; loadByIndex(focusedIndex); }
            else if (e.keyCode === 40) { focusedIndex = (focusedIndex + 1 + filteredChannels.length) % filteredChannels.length; loadByIndex(focusedIndex); }
        }
    });

    document.getElementById('touchLayer').addEventListener('click', function () {
        let now = new Date().getTime();
        if (now - lastTap < 300) {
            if (document.getElementById('jwplayer').style.display !== "none") {
                jwplayer().setFullscreen(!jwplayer().getFullscreen());
            }
        } else {
            toggleMenu();
        }
        lastTap = now;
    });

    init();
</script>
</body>
</html>
