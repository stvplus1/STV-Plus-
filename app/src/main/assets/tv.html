<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STv+ TiviMate Pro Plus</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --tivi-blue: #0277bd; 
            --tivi-grey: rgba(255, 255, 255, 0.1); 
            --bg-dark: rgba(20, 24, 30, 0.98); 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: transparent; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: none; direction: ltr; }
        
        #app-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        #video-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: transparent; }
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; outline: none; }
        
        #loader { position: absolute; z-index: 50; display: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--tivi-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* نیشاندانا هژمارێن لێدایی ل سەر کۆنترۆلێ */
        #num-indicator {
            position: absolute; top: 30px; left: 40px; background: rgba(2, 119, 189, 0.9); color: white;
            padding: 8px 20px; border-radius: 8px; font-size: 28px; font-weight: bold; z-index: 3000; display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #info-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 100; opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; gap: 20px;
            pointer-events: none;
        }
        #info-bar.show { opacity: 1; }
        .info-logo { width: 70px; height: 70px; object-fit: contain; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; }
        .info-details { flex: 1; }
        .info-title { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; }
        .info-num { color: #aaa; font-size: 24px; }
        .info-epg { font-size: 16px; color: #00e676; margin-top: 5px; font-weight: bold; }

        #tivi-menu {
            position: absolute; top: 0; left: 0; height: 100%;
            display: flex; flex-direction: row; z-index: 200;
            transform: translateX(-100%); transition: transform 0.2s ease-out;
        }
        #tivi-menu.open { transform: translateX(0); }

        #col-groups { 
            width: 250px; height: 100%; background: var(--bg-dark);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
            margin-left: -250px; 
            transition: margin-left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #tivi-menu.show-groups #col-groups { margin-left: 0; }

        .col-header { padding: 20px; font-size: 18px; font-weight: bold; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .list-container { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 10px 0; }
        .list-container::-webkit-scrollbar { display: none; }
        
        .group-item {
            padding: 15px 20px; font-size: 16px; color: #ccc; cursor: pointer; transition: 0.1s;
            display: flex; align-items: center; gap: 10px; border-left: 4px solid transparent;
        }
        .group-item.selected { background: var(--tivi-grey); color: white; }
        .group-item.focused { background: var(--tivi-blue); color: white; border-left-color: white; }

        #col-channels { 
            width: 350px; height: 100%; background: var(--bg-dark);
            display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
        }
        
        .ch-item {
            display: flex; align-items: center; padding: 10px 15px; cursor: pointer;
            transition: 0.1s; border-left: 4px solid transparent; border-bottom: 1px solid rgba(255,255,255,0.02);
            content-visibility: auto; 
            contain-intrinsic-size: 61px;
            will-change: background, border-color;
        }
        .ch-item.selected { background: var(--tivi-grey); }
        .ch-item.focused { background: var(--tivi-blue); color: white; border-left-color: white; }
        .ch-item.playing .ch-name { color: #00e676; } 
        
        .ch-num { width: 40px; font-size: 14px; color: #888; font-weight: bold; text-align: center; }
        .ch-logo { width: 40px; height: 40px; object-fit: contain; margin: 0 15px; }
        .ch-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .ch-name { font-size: 16px; font-weight: bold; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-epg { font-size: 12px; color: #888; margin-top: 2px; }

        #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 1000; opacity: 0; transition: 0.2s; }
        #toast.show { opacity: 1; }

        /* --- ستایلێن شاشەیا ئاپدەیتێ --- */
        #update-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            z-index: 99999; display: none; justify-content: center; align-items: center;
            direction: ltr; font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        .update-box {
            background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
            width: 90%; max-width: 380px; padding: 40px 30px;
            border-radius: 24px; text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 50px rgba(229, 9, 20, 0.2);
            position: relative; overflow: hidden;
        }

        .update-box::before {
            content: ''; position: absolute; top: -50px; left: 50%; transform: translateX(-50%);
            width: 150px; height: 150px; background: rgba(229, 9, 20, 0.15);
            filter: blur(50px); z-index: 0; pointer-events: none;
        }

        .icon-glow {
            position: relative; z-index: 1; font-size: 45px; color: #e50914;
            margin-bottom: 20px; text-shadow: 0 0 20px rgba(229, 9, 20, 0.6);
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }

        .update-box h2 { position: relative; z-index: 1; color: white; font-size: 22px; font-weight: 800; margin-bottom: 5px; letter-spacing: 1px; }
        .text-red { position: relative; z-index: 1; color: #e50914; font-size: 14px; font-weight: bold; margin-bottom: 20px; }
        .desc { position: relative; z-index: 1; color: #aaa; font-size: 14px; line-height: 1.5; margin-bottom: 30px; padding: 0 10px; }

        #btn-update {
            position: relative; z-index: 1;
            background: linear-gradient(90deg, #e50914 0%, #b30710 100%);
            color: white; border: none; padding: 15px 0; width: 100%;
            border-radius: 12px; font-size: 15px; font-weight: bold;
            letter-spacing: 1px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 8px 20px rgba(229, 9, 20, 0.3); outline: none;
        }
        #btn-update:hover, #btn-update:focus { transform: scale(1.03); box-shadow: 0 10px 25px rgba(229, 9, 20, 0.5); border: 2px solid white; }

        #update-progress-container { display: none; position: relative; z-index: 1; margin-top: 10px; text-align: left; }
        .progress-text { color: #e50914; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .progress-bar-bg { width: 100%; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; }
        .progress-bar-fill { width: 0%; height: 100%; background: #e50914; border-radius: 10px; transition: width 0.4s ease; box-shadow: 0 0 10px rgba(229, 9, 20, 0.8); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="video-layer">
        <div id="videoContainer">
            <video id="main-video" playsinline autoplay></video>
        </div>
        <div id="loader"><div class="spinner"></div></div>
    </div>

    <div id="num-indicator"></div>

    <div id="info-bar">
        <img class="info-logo" id="ib-logo" src="" alt="">
        <div class="info-details">
            <div class="info-title"><span class="info-num" id="ib-num">1</span> <span id="ib-name">کەناڵ</span></div>
            <div class="info-epg">No information</div>
        </div>
    </div>

    <div id="tivi-menu">
        <div id="col-groups">
            <div class="col-header">گروپێن کەناڵان</div>
            <div class="list-container" id="groups-list"></div>
        </div>
        <div id="col-channels">
            <div class="col-header" id="current-group-title">هەمی</div>
            <div class="list-container" id="channels-list"></div>
        </div>
    </div>
    
    <div id="toast"></div>
</div>

<!-- شاشەیا ئاپدەیتێ ل پێشیێ -->
<div id="update-overlay">
    <div class="update-box">
        <div class="icon-glow">
            <i class="fas fa-rocket"></i>
        </div>
        <h2>UPDATE AVAILABLE</h2>
        <h4 class="text-red">STv+ is getting better</h4>
        <p class="desc">New update available! Let's update it to enjoy the latest features and improved stability.</p>
        
        <button id="btn-update" onclick="startUpdate()">LET'S UPDATE IT</button>
        
        <div id="update-progress-container">
            <div class="progress-text">Downloading Update... <span id="progress-percent">0%</span></div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // --- بەشێ ئاپدەیتێ (Update) ---
    const APP_VERSION = 1.0; 
    const UPDATE_JSON_URL = "https://raw.githubusercontent.com/stvplus1/STV-Plus-/refs/heads/main/update.json"; 
    let downloadApkUrl = "";
    let isUpdating = false;

    function checkForUpdate() {
        fetch(UPDATE_JSON_URL + '?t=' + Date.now())
            .then(response => response.json())
            .then(data => {
                if (data && data.version > APP_VERSION) {
                    downloadApkUrl = data.apk_url;
                    isUpdating = true;
                    document.getElementById('update-overlay').style.display = 'flex';
                    document.getElementById('btn-update').focus();
                }
            })
            .catch(err => console.log("No update available.", err));
    }

    window.startUpdate = function() {
        document.getElementById('btn-update').style.display = 'none';
        document.getElementById('update-progress-container').style.display = 'block';
        
        let percent = 0;
        let downloadInterval = setInterval(() => {
            percent += Math.floor(Math.random() * 5) + 1;
            if (percent >= 100) percent = 100;
            
            document.getElementById('progress-percent').innerText = percent + "%";
            document.getElementById('progress-fill').style.width = percent + "%";
            
            if (percent >= 100) {
                clearInterval(downloadInterval);
                setTimeout(() => {
                    window.location.href = downloadApkUrl; 
                }, 500);
            }
        }, 150);
    };

    // --- بەشێ سەرەکی یێ کەناڵان ---
    const CHANNELS_URL = "https://raw.githubusercontent.com/stvplus1/STV-Plus-/refs/heads/main/channels.json";
    
    let allChannels = [];
    let groups = ["هەمی", "دڵخواز", "کوردستان", "تورکی", "عەرەبی", "ئاینی", "زاروک", "وەرزشی", "OSN"];
    let filteredChannels = [];
    
    let isMenuOpen = false;
    let showGroups = false;
    let activeColumn = 'channels';
    
    let selGroupIndex = 0;
    let selChannelIndex = 0;
    let playGroupIndex = 0;
    let playChannelIndex = -1;
    let currentPlayingChannel = null;

    let uiTimer, reconnectTimer, numTimer, stallTimer;
    let typedNumber = "";
    window.shakaPlayer = null;
    let favChannels = JSON.parse(localStorage.getItem('favChannels')) || [];

    const videoElement = document.getElementById('main-video');

    function triggerAutoReconnect() {
        if (reconnectTimer) return;
        
        document.getElementById('loader').style.display = 'block';
        reconnectTimer = setTimeout(() => {
            reconnectTimer = null;
            if (currentPlayingChannel) {
                playChannel(currentPlayingChannel, playChannelIndex);
            }
        }, 3000);
    }

    videoElement.onerror = () => triggerAutoReconnect();
    videoElement.onstalled = () => triggerAutoReconnect();
    videoElement.onwaiting = () => {
        clearTimeout(stallTimer);
        stallTimer = setTimeout(() => {
            triggerAutoReconnect();
        }, 5000);
    };
    videoElement.onplaying = () => {
        clearTimeout(stallTimer);
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
        document.getElementById('loader').style.display = 'none';
    };

    async function initApp() {
        // پشکنین بۆ ئاپدەیتێ ڕاستەوخۆ دەمێ بەرنامە ڤەدبیت
        checkForUpdate();

        try {
            let res = await fetch(CHANNELS_URL + '?t=' + Date.now());
            allChannels = await res.json();
            
            updateFilteredChannels();
            
            if (allChannels.length > 0) {
                let lastChId = localStorage.getItem('last_channel_id');
                let targetIdx = 0;
                
                if (lastChId) {
                    let foundIdx = filteredChannels.findIndex((c, i) => (c.id ? c.id == lastChId : (allChannels.indexOf(c) + 1) == lastChId));
                    if (foundIdx !== -1) targetIdx = foundIdx;
                }
                
                selChannelIndex = targetIdx;
                playChannel(filteredChannels[targetIdx], targetIdx);
            }
        } catch (e) {
            showToast("کێشە د هێنانا کەنالان دا هەیە");
        }
    }

    function updateFilteredChannels() {
        let gName = groups[selGroupIndex];
        document.getElementById('current-group-title').innerText = gName;
        
        if (gName === "هەمی") {
            filteredChannels = allChannels;
        } else if (gName === "دڵخواز") {
            filteredChannels = allChannels.filter(c => favChannels.includes(c.id));
        } else {
            filteredChannels = allChannels.filter(c => c.group === gName);
        }
        
        if(!isMenuOpen) {
            selChannelIndex = filteredChannels.findIndex(c => currentPlayingChannel && c.id === currentPlayingChannel.id);
            if(selChannelIndex === -1) selChannelIndex = 0;
        } else if (activeColumn === 'groups') {
            selChannelIndex = 0;
        }
    }

    function renderGroups() {
        const list = document.getElementById('groups-list');
        list.innerHTML = '';
        groups.forEach((g, idx) => {
            let div = document.createElement('div');
            let isFocused = (activeColumn === 'groups' && idx === selGroupIndex);
            let isSelected = (activeColumn === 'channels' && idx === selGroupIndex);
            
            div.className = `group-item ${isFocused ? 'focused' : ''} ${isSelected ? 'selected' : ''}`;
            div.id = 'grp-' + idx;
            div.innerHTML = `<span>${g}</span>`;
            div.onclick = () => { 
                selGroupIndex = idx; 
                showGroups = false; 
                activeColumn = 'channels'; 
                updateFilteredChannels(); 
                updateMenuClasses();
                renderGroups(); 
                renderChannels();
            };
            list.appendChild(div);
        });
        scrollToItem('grp-' + selGroupIndex);
    }

    function updateChannelFocus(oldIdx, newIdx) {
        let oldEl = document.getElementById('ch-' + oldIdx);
        if (oldEl) oldEl.classList.remove('focused');
        
        let newEl = document.getElementById('ch-' + newIdx);
        if (newEl) newEl.classList.add('focused');
        
        scrollToItem('ch-' + newIdx);
    }

    function updatePlayingState(oldCh, newCh) {
        if (oldCh) {
            let oldIdx = filteredChannels.findIndex(c => c.id === oldCh.id);
            if (oldIdx !== -1) {
                let el = document.getElementById('ch-' + oldIdx);
                if (el) el.classList.remove('playing');
            }
        }
        if (newCh) {
            let newIdx = filteredChannels.findIndex(c => c.id === newCh.id);
            if (newIdx !== -1) {
                let el = document.getElementById('ch-' + newIdx);
                if (el) el.classList.add('playing');
            }
        }
    }

    window.handleChannelClick = function(idx) {
        activeColumn = 'channels';
        let oldIdx = selChannelIndex;
        selChannelIndex = idx;
        updateChannelFocus(oldIdx, idx);
        playChannel(filteredChannels[idx], idx); 
        toggleMenu(false); 
    };

    function renderChannels() {
        const list = document.getElementById('channels-list');
        
        if (filteredChannels.length === 0) {
            list.innerHTML = `<div style="padding: 20px; color: #888; text-align: center;">هیچ کەناڵێک نییە</div>`;
            return;
        }

        let html = "";
        let len = filteredChannels.length;
        
        for(let idx = 0; idx < len; idx++) {
            let ch = filteredChannels[idx];
            let isFocused = (activeColumn === 'channels' && idx === selChannelIndex) ? 'focused' : '';
            let isSelected = (activeColumn === 'groups' && idx === selChannelIndex) ? 'selected' : '';
            let isPlaying = (currentPlayingChannel && currentPlayingChannel.id === ch.id) ? 'playing' : '';
            
            let displayNum = ch.id || (allChannels.indexOf(ch) + 1);

            html += `
            <div class="ch-item ${isFocused} ${isSelected} ${isPlaying}" id="ch-${idx}" onclick="handleChannelClick(${idx})">
                <div class="ch-num">${displayNum}</div>
                <img class="ch-logo" src="${ch.logo}" loading="lazy" onerror="this.src='https://via.placeholder.com/40'">
                <div class="ch-info">
                    <div class="ch-name">${ch.name}</div>
                    <div class="ch-epg">No information</div>
                </div>
            </div>`;
        }
        
        list.innerHTML = html;
        
        requestAnimationFrame(() => {
            scrollToItem('ch-' + selChannelIndex);
        });
    }

    function scrollToItem(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ block: 'center', behavior: 'auto' });
    }

    function showInfoBar(ch) {
        if(ch) {
            document.getElementById('ib-num').innerText = ch.id || (allChannels.indexOf(ch) + 1);
            document.getElementById('ib-name').innerText = ch.name;
            document.getElementById('ib-logo').src = ch.logo;
        }
        
        const bar = document.getElementById('info-bar');
        bar.classList.add('show');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => {
            if (!isMenuOpen) bar.classList.remove('show');
        }, 5000); 
    }

    function toggleMenu(force, withGroups = false) {
        isMenuOpen = force !== undefined ? force : !isMenuOpen;
        const infoBar = document.getElementById('info-bar');
        
        if (isMenuOpen) {
            showGroups = withGroups;
            activeColumn = showGroups ? 'groups' : 'channels';
            updateMenuClasses();
            
            infoBar.classList.remove('show');
            selGroupIndex = playGroupIndex;
            updateFilteredChannels();
            selChannelIndex = playChannelIndex !== -1 ? playChannelIndex : 0;
            
            renderGroups();
            renderChannels();
        } else {
            updateMenuClasses();
            showInfoBar(currentPlayingChannel); 
        }
    }

    function updateMenuClasses() {
        const menu = document.getElementById('tivi-menu');
        if (isMenuOpen) {
            menu.classList.add('open');
            if (showGroups) menu.classList.add('show-groups');
            else menu.classList.remove('show-groups');
        } else {
            menu.classList.remove('open');
        }
    }

    function playChannel(ch, indexInFiltered) {
        if (!ch) return;
        let oldPlaying = currentPlayingChannel; 
        currentPlayingChannel = ch;
        playGroupIndex = selGroupIndex;
        playChannelIndex = indexInFiltered;
        
        clearTimeout(reconnectTimer);
        clearTimeout(stallTimer);
        reconnectTimer = null;

        let channelIdToSave = ch.id ? ch.id : (allChannels.indexOf(ch) + 1);
        localStorage.setItem('last_channel_id', channelIdToSave);

        showInfoBar(ch);
        if(isMenuOpen) {
            updatePlayingState(oldPlaying, ch); 
        }

        const loader = document.getElementById('loader');
        const videoContainer = document.getElementById('videoContainer');

        loader.style.display = 'block';

        if (window.shakaPlayer) {
            window.shakaPlayer.destroy();
            window.shakaPlayer = null;
        }

        if (ch.type !== 'dash') {
            videoContainer.style.display = 'none'; 
            if (window.AndroidPlayer) {
                window.AndroidPlayer.playStream(ch.url, ch.type || 'hls', ch.referer || "", ch.drmKeyId || "", ch.drmKey || "");
            } else {
                videoContainer.style.display = 'block';
                if (Hls.isSupported()) {
                    const hls = new Hls(); 
                    hls.loadSource(ch.url); 
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => videoElement.play().catch(() => triggerAutoReconnect()));
                    
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            triggerAutoReconnect();
                        }
                    });
                } else { 
                    videoElement.src = ch.url; 
                    videoElement.play().catch(() => triggerAutoReconnect()); 
                }
            }
            setTimeout(() => { loader.style.display = 'none'; }, 1500);
        } else {
            videoContainer.style.display = 'block'; 
            if (window.AndroidPlayer) {
                window.AndroidPlayer.playStream("about:blank", "hls", "", "", ""); 
            }
            shaka.polyfill.installAll();
            window.shakaPlayer = new shaka.Player(videoElement);
            
            window.shakaPlayer.addEventListener('error', () => triggerAutoReconnect());

            if (ch.drmKeyId && ch.drmKey) {
                window.shakaPlayer.configure({ drm: { clearKeys: { [ch.drmKeyId]: ch.drmKey } } });
            }
            window.shakaPlayer.load(ch.url).then(() => {
                videoElement.play().catch(() => triggerAutoReconnect()); 
                loader.style.display = 'none';
            }).catch(e => {
                loader.style.display = 'none';
                triggerAutoReconnect();
            });
        }
    }

    function handleNumberInput(digit) {
        clearTimeout(numTimer);
        typedNumber += digit;
        
        const ind = document.getElementById('num-indicator');
        ind.innerText = typedNumber;
        ind.style.display = 'block';
        
        numTimer = setTimeout(() => {
            let targetId = parseInt(typedNumber);
            typedNumber = "";
            ind.style.display = 'none';
            
            let globalIdx = allChannels.findIndex((c, i) => (c.id ? c.id == targetId : (i + 1) == targetId));
            
            if (globalIdx !== -1) {
                let foundCh = allChannels[globalIdx];
                selGroupIndex = groups.indexOf(foundCh.group) !== -1 ? groups.indexOf(foundCh.group) : 0;
                updateFilteredChannels();
                
                let filteredIdx = filteredChannels.findIndex((c, i) => (c.id ? c.id == targetId : (allChannels.indexOf(c) + 1) == targetId));
                if (filteredIdx !== -1) {
                    selChannelIndex = filteredIdx;
                    playChannel(foundCh, filteredIdx);
                }
            } else {
                showToast("کەناڵ نەهاتە دیتن");
            }
        }, 1200);
    }

    document.addEventListener('keydown', (e) => {
        // ئەگەر شاشەیا ئاپدەیتێ یا ڤەکری بیت، مەجالێ نەدە کەناڵان بگۆڕیت
        if (isUpdating) return;

        const key = e.keyCode;
        const keyChar = e.key;
        
        if (/^\d$/.test(keyChar)) {
            handleNumberInput(keyChar);
            e.preventDefault();
            return;
        }

        if ([8, 27, 10009, 461].includes(key)) {
            if (isMenuOpen) { 
                if (showGroups) {
                    showGroups = false; activeColumn = 'channels';
                    updateMenuClasses(); renderGroups(); renderChannels();
                } else {
                    toggleMenu(false);
                }
                e.preventDefault(); return; 
            }
        }

        if (isMenuOpen) {
            e.preventDefault();
            if (activeColumn === 'channels') {
                switch(key) {
                    case 38: 
                        if (selChannelIndex > 0) {
                            let oldIdx = selChannelIndex;
                            selChannelIndex--;
                            updateChannelFocus(oldIdx, selChannelIndex);
                        }
                        break;
                    case 40: 
                        if (selChannelIndex < filteredChannels.length - 1) {
                            let oldIdx = selChannelIndex;
                            selChannelIndex++;
                            updateChannelFocus(oldIdx, selChannelIndex);
                        }
                        break;
                    case 37:
                        showGroups = true; activeColumn = 'groups'; 
                        updateMenuClasses(); renderGroups(); renderChannels(); break;
                    case 39:
                        toggleMenu(false); break;
                    case 13:
                        playChannel(filteredChannels[selChannelIndex], selChannelIndex); 
                        toggleMenu(false); break;
                }
            } else if (activeColumn === 'groups') {
                switch(key) {
                    case 38:
                        if (selGroupIndex > 0) selGroupIndex--;
                        updateFilteredChannels(); renderGroups(); break;
                    case 40:
                        if (selGroupIndex < groups.length - 1) selGroupIndex++;
                        updateFilteredChannels(); renderGroups(); break;
                    case 39: 
                    case 13:
                        showGroups = false; activeColumn = 'channels'; 
                        updateMenuClasses(); renderGroups(); renderChannels(); break;
                    case 37:
                        toggleMenu(false); break;
                }
            }
        } else {
            if ([38, 40, 37, 39, 13].includes(key)) e.preventDefault();
            
            switch(key) {
                case 38: 
                    if (playChannelIndex < filteredChannels.length - 1) {
                        playChannel(filteredChannels[playChannelIndex + 1], playChannelIndex + 1);
                    }
                    break;
                case 40: 
                    if (playChannelIndex > 0) {
                        playChannel(filteredChannels[playChannelIndex - 1], playChannelIndex - 1);
                    }
                    break;
                case 37: 
                case 13: 
                    toggleMenu(true, false); break;
                case 39: 
                    showInfoBar(currentPlayingChannel); break;
            }
        }
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    initApp();

</script>
</body>
