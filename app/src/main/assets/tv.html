    <style>
        :root { 
            --tivi-blue: #0277bd; 
            --tivi-grey: rgba(255, 255, 255, 0.15); 
            /* باکگراوەندێ زۆر شەفاف و جوان بۆ شوشەیێ */
            --bg-dark: rgba(10, 15, 20, 0.25); 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: transparent; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: none; direction: ltr; }
        
        #app-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        #video-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: transparent; }
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; outline: none; }
        
        #loader { position: absolute; z-index: 50; display: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--tivi-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        #num-indicator {
            position: absolute; top: 30px; left: 40px; background: rgba(2, 119, 189, 0.9); color: white;
            padding: 8px 20px; border-radius: 8px; font-size: 28px; font-weight: bold; z-index: 3000; display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        #info-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 100; opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; gap: 20px;
            pointer-events: none;
        }
        #info-bar.show { opacity: 1; }
        .info-logo { width: 70px; height: 70px; object-fit: contain; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; }
        .info-details { flex: 1; }
        .info-title { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; }
        .info-num { color: #aaa; font-size: 24px; }
        .info-epg { font-size: 16px; color: #00e676; margin-top: 5px; font-weight: bold; }

        #tivi-menu {
            position: absolute; top: 0; left: 0; height: 100%;
            display: flex; flex-direction: row; z-index: 200;
            transform: translateX(-100%); 
            /* ڤەشارتنا تەمام دەمێ دادێخین دا سێبەر نەمینیت */
            visibility: hidden;
            transition: transform 0.25s ease-out, visibility 0s linear 0.25s;
        }
        #tivi-menu.open { 
            transform: translateX(0); 
            visibility: visible;
            transition: transform 0.25s ease-out, visibility 0s;
        }

        #col-groups { 
            width: 250px; height: 100%; background: var(--bg-dark);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
            margin-left: -250px; 
            transition: margin-left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            /* ئیفێکتی شوشەیی بۆ گرووپان */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        #tivi-menu.show-groups #col-groups { margin-left: 0; }

        .col-header { padding: 20px; font-size: 18px; font-weight: bold; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); }
        .list-container { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 10px 0; }
        .list-container::-webkit-scrollbar { display: none; }
        
        .group-item {
            padding: 15px 20px; font-size: 16px; color: #ccc; cursor: pointer; transition: 0.1s;
            display: flex; align-items: center; gap: 10px; border-left: 4px solid transparent;
        }
        .group-item.selected { background: var(--tivi-grey); color: white; }
        .group-item.focused { background: var(--tivi-blue); color: white; border-left-color: white; }

        #col-channels { 
            width: 350px; height: 100%; background: var(--bg-dark);
            display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255,255,255,0.05);
            /* سێبەرا ڕەش ب تەمامی هاتیە لادان */
            box-shadow: none;
            /* ئیفێکتی شوشەیی بۆ کەناڵان */
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }
        
        .ch-item {
            display: flex; align-items: center; padding: 10px 15px; cursor: pointer;
            transition: 0.1s; border-left: 4px solid transparent; border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .ch-item.selected { background: var(--tivi-grey); }
        .ch-item.focused { background: var(--tivi-blue); color: white; border-left-color: white; }
        .ch-item.playing .ch-name { color: #00e676; } 
        
        .ch-num { width: 40px; font-size: 14px; color: #ccc; font-weight: bold; text-align: center; }
        .ch-logo { width: 40px; height: 40px; object-fit: contain; margin: 0 15px; }
        .ch-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .ch-name { font-size: 16px; font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .ch-epg { font-size: 12px; color: #bbb; margin-top: 2px; }

        #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(239, 68, 68, 0.85); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 1000; opacity: 0; transition: 0.2s; backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
        #toast.show { opacity: 1; }
    </style>
