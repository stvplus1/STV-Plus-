<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STv+ Ultra Fast UI & Pro Players</title>
    
    <!-- کتێبخانەیێن پێدڤی بۆ HLS و Shaka Player -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.compiled.js"></script>
    
    <style>
        :root { 
            --green: #00e676; 
            --bg-menu: rgba(12, 12, 12, 0.95);
            --bg-bar: rgba(10, 10, 10, 0.95);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: transparent; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: none; }
        
        #app-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        /* شاشەیا ڤیدیۆیێ ل پشتەڤە */
        #video-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: transparent; display: flex; justify-content: center; align-items: center; }
        
        /* شوینێ ڤیدیۆیێ بۆ Shaka Player */
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; outline: none; }
        
        /* لۆدەری کەسک یێ ناوەڕاستێ */
        #loader { 
            position: absolute; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .spinner {
            width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--green);
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        #load-num { position: absolute; font-size: 14px; font-weight: bold; color: white; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* باری زانیاریان ل خوارێ (Bottom Bar) */
        #bottom-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); 
            width: 90%; max-width: 800px; background: var(--bg-bar); border-radius: 12px;
            border: 1px solid #333; display: flex; align-items: center; padding: 12px 20px;
            z-index: 100; transition: transform 0.2s ease-out, opacity 0.2s; opacity: 0; direction: ltr;
        }
        #bottom-bar.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        
        .bb-num { color: var(--green); font-size: 20px; font-weight: bold; min-width: 40px; text-align: left; }
        .bb-logo { width: 45px; height: 45px; object-fit: contain; margin: 0 15px; border-radius: 6px; }
        .bb-name { flex: 1; font-size: 18px; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bb-hd { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }

        /* مینیویا چەپێ (Left Menu) */
        #left-menu {
            position: absolute; top: 0; left: 0; height: 100%; width: 280px;
            background: var(--bg-menu); border-right: 1px solid #222; z-index: 200;
            transform: translateX(-100%); transition: transform 0.15s ease-out;
            display: flex; flex-direction: column; direction: ltr;
        }
        #left-menu.open { transform: translateX(0); }
        
        .menu-header { padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid #222; font-weight: bold; display: flex; justify-content: space-between; align-items: center; color: var(--green); }
        
        #channel-list { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; padding: 10px 5px; }
        #channel-list::-webkit-scrollbar { display: none; }
        
        .ch-item {
            display: flex; align-items: center; padding: 8px 12px; margin-bottom: 5px;
            border-radius: 8px; border: 2px solid transparent; cursor: pointer;
            transition: 0.1s; background: transparent;
        }
        .ch-item.focused { border-color: var(--green); background: rgba(0, 230, 118, 0.08); }
        .ch-item.playing { background: rgba(255, 255, 255, 0.05); }
        
        .ch-item-num { font-size: 12px; color: #888; font-weight: bold; min-width: 25px; text-align: right; margin-right: 10px; }
        .ch-item-logo { width: 35px; height: 35px; object-fit: contain; margin-right: 12px; }
        .ch-item-name { font-size: 14px; font-weight: bold; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 1000; opacity: 0; transition: 0.2s; pointer-events: none; }
        #toast.show { opacity: 1; }
    </style>
</head>
<body>

<div id="app-container">
    <div id="video-layer">
        <!-- شوینێ Shaka Player کو تەنێ بۆ دەمێ پێدڤی دیار دبیت -->
        <div id="videoContainer">
            <video id="main-video" playsinline autoplay></video>
        </div>
        
        <div id="loader">
            <div class="spinner"></div>
            <span id="load-num">0</span>
        </div>
    </div>

    <div id="bottom-bar">
        <div class="bb-num" id="bb-num">01</div>
        <img class="bb-logo" id="bb-logo" src="" alt="logo">
        <div class="bb-name" id="bb-name">ناوی کەناڵ</div>
        <div class="bb-hd">HD</div>
    </div>

    <div id="left-menu">
        <div class="menu-header">
            <span style="color: white; font-size: 14px;">بەشەکان</span>
            <span id="cat-name">هەمی</span>
        </div>
        <div id="channel-list"></div>
    </div>
    
    <div id="toast"></div>
</div>

<script>
    const CHANNELS_URL = "https://raw.githubusercontent.com/stvplus1/STV-Plus-/refs/heads/main/channels.json";
    
    let channels = [];
    let isMenuOpen = false;
    let focusedIndex = 0;
    let playingIndex = -1;
    let uiTimer, loadTimer;
    window.shakaPlayer = null;
    
    async function loadChannels() {
        try {
            let res = await fetch(CHANNELS_URL + '?t=' + Date.now());
            channels = await res.json();
            renderList();
            if (channels.length > 0) {
                // ڤەکرنا کەنالێ ئێکێ ب شێوەیێ خۆکار
                playChannel(0);
            }
        } catch (e) {
            showToast("کێشە د هێنانا کەنالان دا هەیە");
        }
    }

    function renderList() {
        const list = document.getElementById('channel-list');
        list.innerHTML = '';
        channels.forEach((ch, idx) => {
            let div = document.createElement('div');
            div.className = `ch-item ${idx === focusedIndex ? 'focused' : ''} ${idx === playingIndex ? 'playing' : ''}`;
            div.id = 'ch-' + idx;
            div.innerHTML = `
                <div class="ch-item-num">${ch.id || idx+1}</div>
                <img class="ch-item-logo" src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'">
                <div class="ch-item-name">${ch.name}</div>
            `;
            div.onclick = () => { focusedIndex = idx; playChannel(idx); toggleMenu(false); };
            list.appendChild(div);
        });
        updateFocusScroll();
    }

    function showUI() {
        const bar = document.getElementById('bottom-bar');
        bar.classList.add('show');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => {
            if (!isMenuOpen) bar.classList.remove('show');
        }, 4000); 
    }

    function toggleMenu(force) {
        isMenuOpen = force !== undefined ? force : !isMenuOpen;
        const menu = document.getElementById('left-menu');
        const bar = document.getElementById('bottom-bar');
        
        if (isMenuOpen) {
            menu.classList.add('open');
            bar.classList.add('show');
            clearTimeout(uiTimer); 
            focusedIndex = playingIndex !== -1 ? playingIndex : 0;
            updateFocusVisuals();
        } else {
            menu.classList.remove('open');
            showUI(); 
        }
    }

    function playChannel(index) {
        if (!channels[index]) return;
        playingIndex = index;
        const ch = channels[index];
        
        // نویکرنەڤەیا باری خوارێ
        document.getElementById('bb-num').innerText = String(ch.id || index+1).padStart(2, '0');
        document.getElementById('bb-name').innerText = ch.name;
        document.getElementById('bb-logo').src = ch.logo;
        showUI();
        renderList(); 

        const loader = document.getElementById('loader');
        const loadNum = document.getElementById('load-num');
        const videoContainer = document.getElementById('videoContainer');
        const video = document.getElementById('main-video');

        // نیشاندانا لۆدەری
        loader.style.display = 'flex';
        let perc = 0;
        clearInterval(loadTimer);
        loadTimer = setInterval(() => {
            perc += 5;
            loadNum.innerText = perc;
            if (perc >= 100) clearInterval(loadTimer);
        }, 40);

        // پاقژکرنا Shaka Player یێ کەڤن
        if (window.shakaPlayer) {
            window.shakaPlayer.destroy();
            window.shakaPlayer = null;
        }

        // ١. کارپێکرنا ExoPlayer (بۆ کەنالێن ئاسایی وەکو ڕووداو)
        if (ch.type !== 'dash') {
            videoContainer.style.display = 'none'; // شاردنەڤەیا ڤیدیۆیا HTML
            if (window.AndroidPlayer) {
                window.AndroidPlayer.playStream(ch.url, ch.type || 'hls', ch.referer || "", ch.drmKeyId || "", ch.drmKey || "");
            } else {
                // ئەگەر ل وێبگەرێ بوو بۆ تاقیکرنێ
                videoContainer.style.display = 'block';
                if (Hls.isSupported()) {
                    const hls = new Hls(); hls.loadSource(ch.url); hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
                } else { video.src = ch.url; video.play(); }
            }
            setTimeout(() => { loader.style.display = 'none'; clearInterval(loadTimer); }, 1500);
        } 
        
        // ٢. کارپێکرنا Shaka Player (بۆ کەنالێن Dash و Starz Play)
        else {
            videoContainer.style.display = 'block'; // نیشاندانا ڤیدیۆیا HTML
            
            // ڕاگرتنا ExoPlayer دا دەنگ تێکەل نەبن
            if (window.AndroidPlayer) {
                window.AndroidPlayer.playStream("about:blank", "hls", "", "", ""); 
            }

            shaka.polyfill.installAll();
            window.shakaPlayer = new shaka.Player(video);

            if (ch.drmKeyId && ch.drmKey) {
                window.shakaPlayer.configure({
                    drm: { clearKeys: { [ch.drmKeyId]: ch.drmKey } }
                });
            }

            window.shakaPlayer.load(ch.url).then(() => {
                video.play();
                loader.style.display = 'none';
                clearInterval(loadTimer);
            }).catch(e => {
                loader.style.display = 'none';
                clearInterval(loadTimer);
                showToast("کێشە د ڤەکرنا ڤیدیۆیێ دا هەیە");
            });
        }
    }

    function updateFocusVisuals() {
        document.querySelectorAll('.ch-item').forEach((el, idx) => {
            if (idx === focusedIndex) el.classList.add('focused');
            else el.classList.remove('focused');
        });
        updateFocusScroll();
    }

    function updateFocusScroll() {
        const item = document.getElementById('ch-' + focusedIndex);
        if (item) item.scrollIntoView({ block: 'center', behavior: 'smooth' });
    }

    function moveFocus(dir) {
        if (channels.length === 0) return;
        focusedIndex = (focusedIndex + dir + channels.length) % channels.length;
        updateFocusVisuals();
    }

    // کۆنترۆلا دوگمەیان یێن تیڤی بۆکسێ (D-Pad)
    document.addEventListener('keydown', (e) => {
        const key = e.keyCode;
        
        if ([8, 27, 10009, 461].includes(key)) {
            if (isMenuOpen) { toggleMenu(false); e.preventDefault(); return; }
        }

        if (isMenuOpen) {
            switch(key) {
                case 38: moveFocus(-1); e.preventDefault(); break;
                case 40: moveFocus(1); e.preventDefault(); break;
                case 39: toggleMenu(false); e.preventDefault(); break;
                case 13: playChannel(focusedIndex); toggleMenu(false); e.preventDefault(); break;
            }
        } else {
            showUI();
            switch(key) {
                case 38: playChannel((playingIndex - 1 + channels.length) % channels.length); e.preventDefault(); break;
                case 40: playChannel((playingIndex + 1) % channels.length); e.preventDefault(); break;
                case 37: 
                case 13: toggleMenu(true); e.preventDefault(); break;
            }
        }
    });

    document.getElementById('app-container').addEventListener('click', (e) => {
        if (isMenuOpen && !document.getElementById('left-menu').contains(e.target)) {
            toggleMenu(false);
        } else if (!isMenuOpen) {
            showUI();
        }
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    loadChannels();

</script>
</body>
</html>
