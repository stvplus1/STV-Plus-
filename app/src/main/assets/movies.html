        * {
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding: 0;
            user-select: none; 
        }
        
        body {
            background-color: #050505; 
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; 
        }

        .car-dashboard {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: row; 
            background: radial-gradient(circle at top right, #1a1a24 0%, #050505 100%);
        }

        .list-panel {
            width: 35%;
            height: 100%;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .list-title {
            font-size: 24px;
            font-weight: bold;
            color: #a0a0b5;
            margin-bottom: 15px;
            padding-bottom: 10px;
            text-align: center;
        }

        .category-tabs {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding-bottom: 15px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            scrollbar-width: none; 
        }
        
        .category-tabs::-webkit-scrollbar {
            display: none; 
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .tab-btn.active {
            background: #ff6600; 
            border-color: #ff6600;
            box-shadow: 0 4px 10px rgba(255, 102, 0, 0.3);
        }

        .stations-list {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none; 
            -ms-overflow-style: none;
            padding-right: 5px;
        }
        
        .stations-list::-webkit-scrollbar {
            display: none;
        }

        .list-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .list-item:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(-5px);
        }

        .list-item.active {
            background: rgba(255, 102, 0, 0.1);
            border: 2px solid #ff6600; 
            box-shadow: 0 4px 15px rgba(255, 102, 0, 0.2);
        }

        .item-icon {
            font-size: 22px;
            margin-left: 15px;
            color: #ff6600;
            width: 45px;
            text-align: center;
            font-weight: bold;
        }

        .item-name {
            font-size: 18px;
            font-weight: bold;
        }

        .player-panel {
            width: 65%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px; 
            position: relative;
        }

        .clock {
            position: absolute;
            top: 25px;
            right: 35px; 
            font-size: 35px;
            font-weight: bold;
            color: #ffffff;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        .album-art {
            width: 220px;
            height: 180px;
            border-radius: 20px;
            margin-bottom: 20px; 
            background: linear-gradient(145deg, #1a120e, #0a0705); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(255, 102, 0, 0.2);
            border: 2px solid rgba(255, 102, 0, 0.4);
            position: relative;
        }

        .sound-icon {
            width: 80px;
            height: 80px;
            fill: none;
            stroke: #ff6600;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            margin-bottom: 15px;
            animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 10px rgba(255, 102, 0, 0.4)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 25px rgba(255, 102, 0, 0.9)); transform: scale(1.08); }
            100% { filter: drop-shadow(0 0 10px rgba(255, 102, 0, 0.4)); transform: scale(1); }
        }

        .equalizer {
            display: flex;
            gap: 6px;
            height: 30px;
            align-items: flex-end;
        }

        .bar {
            width: 8px;
            background: #ff6600;
            border-radius: 4px;
            animation: bounce 0.5s infinite alternate ease-in-out;
            animation-play-state: paused; 
            height: 5px; 
        }

        .bar:nth-child(1) { animation-duration: 0.4s; }
        .bar:nth-child(2) { animation-duration: 0.7s; }
        .bar:nth-child(3) { animation-duration: 0.5s; }
        .bar:nth-child(4) { animation-duration: 0.8s; }
        .bar:nth-child(5) { animation-duration: 0.6s; }
        .bar:nth-child(6) { animation-duration: 0.4s; }
        .bar:nth-child(7) { animation-duration: 0.7s; }

        @keyframes bounce {
            0% { height: 5px; }
            100% { height: 100%; }
        }

        .equalizer.playing .bar {
            animation-play-state: running;
        }

        .station-name {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 20px; 
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            color: #ffffff;
            text-align: center;
        }

        .marquee-container {
            width: 95%;
            max-width: 700px; 
            margin-bottom: 20px; 
            background: rgba(255, 102, 0, 0.08); 
            border: 1px solid rgba(255, 102, 0, 0.3);
            border-radius: 12px;
            padding: 8px 10px; 
            display: flex;
            align-items: center;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .marquee-icon {
            color: #ff6600;
            font-size: 24px; 
            margin-left: 15px;
            animation: pulse 2s infinite;
            flex-shrink: 0;
        }

        .marquee-wrapper {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            height: 35px;
            display: flex;
            align-items: center;
        }

        .marquee-text {
            position: absolute;
            white-space: nowrap;
            color: #ecf0f1;
            font-size: 18px; 
            font-weight: 700; 
            left: 0;
            animation: scrollLeftToRight 20s linear infinite;
        }

        @keyframes scrollLeftToRight {
            0% { left: 0; transform: translateX(-100%); }
            100% { left: 100%; transform: translateX(0); }
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            font-size: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }
        .btn:active { background: rgba(255, 255, 255, 0.2); transform: scale(0.95); }

        .play-btn {
            width: 85px;
            height: 85px;
            background: #ff6600; 
            color: #ffffff;
            font-size: 35px;
            border: none;
            box-shadow: 0 10px 25px rgba(255, 102, 0, 0.4);
        }

        .play-btn:hover { background: #ff7a22; box-shadow: 0 10px 30px rgba(255, 102, 0, 0.6); }
        .play-btn:active { background: #e65c00; }
        
        audio { display: none; }

            // --- عەرەبی ---
            { name: "MBC FM", url: "https://radio-mbcfm.mbc.net/radio-mbcfm.m3u8", icon: "🎭", category: "عەرەبی" },
            { name: "MBC Panorama FM", url: "https://d6izdil55uftn.cloudfront.net/out/v1/0a06d1d6377c47edbd48721ed724bd08/index_7.m3u8", icon: "🎭", category: "عەرەبی" },
            { name: "MBC Mood FM", url: "https://shd-gcp-live-alt.edgenextcdn.net/live/bitmovin-mbc-mood/78367bf48ccdba501d0d014a10c21031/manifest/audio1/192kbps/audio.m3u8", icon: "🎭", category: "عەرەبی" },
            { name: "Al Rashid FM", url: "https://streaming.shoutcast.com/alrasheed-fm?1710150359856", icon: "🎭", category: "عەرەبی" },

            // --- ئینگلیزی ---
            { name: "Mix FM", url: "http://c2.radioboss.fm:8184/stream", icon: "104.3", category: "ئینگلیزی" },
            { name: "Play Radio", url: "https://playradiokurdistanstream.com/stream", icon: "89.1", category: "ئینگلیزی" }
        ];

        let currentStationIndex = 0;
        let isPlaying = false;
        let activeCategory = 'هەمی'; 

        const audioPlayer = document.getElementById('audioPlayer');
        const audioSource = document.getElementById('audioSource');
        const playPauseBtn = document.getElementById('playPauseBtn');
        const stationName = document.getElementById('stationName');
        const listContainer = document.getElementById('stationsListContainer');
        const tabsContainer = document.getElementById('categoryTabs');
        const equalizer = document.getElementById('equalizer');

        function buildTabs() {
            tabsContainer.innerHTML = "";
            const categories = ['هەمی', 'کوردی','قران كريم', 'عەرەبی', 'ئینگلیزی'];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${cat === activeCategory ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    activeCategory = cat;
                    buildTabs();
                    buildList();
                };
                tabsContainer.appendChild(btn);
            });
        }

        function buildList() {
            listContainer.innerHTML = "";

            stations.forEach((station, index) => {
                if (activeCategory !== 'هەمی' && station.category !== activeCategory) {
                    return; 
                }

                const item = document.createElement('div');
                item.className = `list-item ${index === currentStationIndex ? 'active' : ''}`;
                item.onclick = () => selectStation(index);
                
                item.innerHTML = `
                    <div class="item-icon">${station.icon}</div>
                    <div class="item-name">${station.name}</div>
                `;
                listContainer.appendChild(item);
            });
        }

        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            let minutes = now.getMinutes();
            hours = hours % 12 || 12; 
            minutes = minutes < 10 ? '0' + minutes : minutes;
            document.getElementById('clock').innerText = `${hours}:${minutes}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        function selectStation(index) {
            currentStationIndex = index;
            loadStation(index);
            if (!isPlaying) togglePlay(); 
            else audioPlayer.play();
        }

        function loadStation(index) {
            stationName.innerText = stations[index].name;
            audioSource.src = stations[index].url;
            buildList(); 
            audioPlayer.load();
            if (isPlaying) {
                audioPlayer.play();
            }
        }

        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                playPauseBtn.innerHTML = "▶";
                equalizer.classList.remove("playing"); 
            } else {
                audioPlayer.play();
                playPauseBtn.innerHTML = "⏸";
                equalizer.classList.add("playing"); 
            }
            isPlaying = !isPlaying;
        }

        function nextStation() {
            let nextIdx = currentStationIndex;
            do {
                nextIdx = (nextIdx + 1) % stations.length;
                if (activeCategory === 'هەمی' || stations[nextIdx].category === activeCategory) {
                    selectStation(nextIdx);
                    return;
                }
            } while (nextIdx !== currentStationIndex);
        }

        function prevStation() {
            let prevIdx = currentStationIndex;
            do {
                prevIdx = (prevIdx - 1 + stations.length) % stations.length;
                if (activeCategory === 'هەمی' || stations[prevIdx].category === activeCategory) {
                    selectStation(prevIdx);
                    return;
                }
            } while (prevIdx !== currentStationIndex);
        }

        audioPlayer.addEventListener('error', function() {
            if (isPlaying) {
                setTimeout(() => {
                    audioPlayer.load();
                    audioPlayer.play();
                }, 4000); 
            }
        });

        audioPlayer.addEventListener('ended', function() {
            if (isPlaying) {
                setTimeout(() => {
                    audioPlayer.load();
                    audioPlayer.play();
                }, 2000);
            }
        });

        audioPlayer.addEventListener('stalled', function() {
            if (isPlaying) {
                setTimeout(() => {
                    audioPlayer.load();
                    audioPlayer.play();
                }, 3000);
            }
        });

        buildTabs();
        loadStation(currentStationIndex);
    </script>

</body>
