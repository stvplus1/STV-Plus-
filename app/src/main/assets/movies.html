<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STv+ TiviMate Pro Plus</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.compiled.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { 
            --tivi-blue: #0277bd; 
            --tivi-grey: rgba(255, 255, 255, 0.1); 
            --bg-dark: rgba(20, 24, 30, 0.98); 
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: transparent; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; overflow: hidden; touch-action: none; direction: ltr; }
        
        #app-container { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
        
        #video-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: transparent; }
        #videoContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1; display: none; }
        video { width: 100%; height: 100%; object-fit: contain; background: #000; outline: none; }
        
        #loader { position: absolute; z-index: 50; display: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255, 255, 255, 0.1); border-top-color: var(--tivi-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* نیشاندانا هژمارێن لێدایی ل سەر کۆنترۆلێ */
        #num-indicator {
            position: absolute; top: 30px; left: 40px; background: rgba(2, 119, 189, 0.9); color: white;
            padding: 8px 20px; border-radius: 8px; font-size: 28px; font-weight: bold; z-index: 3000; display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        #info-bar {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 40px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            z-index: 100; opacity: 0; transition: opacity 0.3s; display: flex; align-items: flex-end; gap: 20px;
            pointer-events: none;
        }
        #info-bar.show { opacity: 1; }
        .info-logo { width: 70px; height: 70px; object-fit: contain; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; }
        .info-details { flex: 1; }
        .info-title { font-size: 32px; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); display: flex; align-items: center; gap: 15px; }
        .info-num { color: #aaa; font-size: 24px; }
        .info-epg { font-size: 16px; color: #00e676; margin-top: 5px; font-weight: bold; }

        #tivi-menu {
            position: absolute; top: 0; left: 0; height: 100%;
            display: flex; flex-direction: row; z-index: 200;
            transform: translateX(-100%); transition: transform 0.2s ease-out;
        }
        #tivi-menu.open { transform: translateX(0); }

        #col-groups { 
            width: 250px; height: 100%; background: var(--bg-dark);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-direction: column;
            margin-left: -250px; 
            transition: margin-left 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #tivi-menu.show-groups #col-groups { margin-left: 0; }

        .col-header { padding: 20px; font-size: 18px; font-weight: bold; color: #fff; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .list-container { flex: 1; overflow-y: auto; scrollbar-width: none; padding: 10px 0; }
        .list-container::-webkit-scrollbar { display: none; }
        
        .group-item {
            padding: 15px 20px; font-size: 16px; color: #ccc; cursor: pointer; transition: 0.1s;
            display: flex; align-items: center; gap: 10px; border-left: 4px solid transparent;
        }
        .group-item.selected { background: var(--tivi-grey); color: white; }
        .group-item.focused { background: var(--tivi-blue); color: white; border-left-color: white; }

        #col-channels { 
            width: 350px; height: 100%; background: var(--bg-dark);
            display: flex; flex-direction: column; 
            border-right: 1px solid rgba(255,255,255,0.05);
            box-shadow: 10px 0 30px rgba(0,0,0,0.7);
        }
        
        .ch-item {
            display: flex; align-items: center; padding: 10px 15px; cursor: pointer;
            transition: 0.1s; border-left: 4px solid transparent; border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .ch-item.selected { background: var(--tivi-grey); }
        .ch-item.focused { background: var(--tivi-blue); color: white; border-left-color: white; }
        .ch-item.playing .ch-name { color: #00e676; } 
        
        .ch-num { width: 40px; font-size: 14px; color: #888; font-weight: bold; text-align: center; }
        .ch-logo { width: 40px; height: 40px; object-fit: contain; margin: 0 15px; }
        .ch-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; }
        .ch-name { font-size: 16px; font-weight: bold; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ch-epg { font-size: 12px; color: #888; margin-top: 2px; }

        #toast { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #ef4444; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; z-index: 5000; opacity: 0; transition: 0.2s; }
        #toast.show { opacity: 1; }

        /* ---------- دیزاینا هەلبژاردنێن دەستکاری کرنێ ---------- */
        #context-menu {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 24, 30, 0.95); padding: 15px; border-radius: 12px; z-index: 4000;
            display: none; flex-direction: column; width: 280px; gap: 5px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.1);
        }
        #context-menu.show { display: flex; }
        .ctx-item {
            padding: 12px 15px; color: #ccc; text-align: right; cursor: pointer; border-radius: 8px;
            transition: 0.2s; font-size: 16px; display: flex; align-items: center; gap: 15px;
            direction: rtl;
        }
        .ctx-item i { width: 20px; text-align: center; font-size: 18px; }
        .ctx-item.focused { background: var(--tivi-blue); color: white; font-weight: bold; }
        .ctx-item.danger.focused { background: #d32f2f; }

        /* ---------- دیزاینا مۆدێلێ (پەنجەرەیا نڤیسینێ) ---------- */
        #edit-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(20, 24, 30, 0.98); padding: 25px; border-radius: 12px; z-index: 4000;
            display: none; flex-direction: column; width: 340px; direction: rtl;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9); border: 1px solid var(--tivi-blue);
        }
        #edit-modal.show { display: flex; }
        #modal-title { margin-bottom: 20px; text-align: center; color: white; font-size: 20px; }
        #modal-input {
            width: 100%; padding: 12px; margin-bottom: 25px; background: #222; color: white;
            border: 2px solid #444; border-radius: 8px; font-size: 18px; text-align: center;
        }
        #modal-input:focus { border-color: var(--tivi-blue); outline: none; }
        .modal-btns { display: flex; gap: 15px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; }
        .btn-cancel { background: #444; }
        .btn-save { background: var(--tivi-blue); }
        .modal-btn.focused { outline: 3px solid white; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div id="app-container">
    <div id="video-layer">
        <div id="videoContainer">
            <video id="main-video" playsinline autoplay></video>
        </div>
        <div id="loader"><div class="spinner"></div></div>
    </div>

    <div id="num-indicator"></div>

    <div id="info-bar">
        <img class="info-logo" id="ib-logo" src="" alt="">
        <div class="info-details">
            <div class="info-title"><span class="info-num" id="ib-num">1</span> <span id="ib-name">کەناڵ</span></div>
            <div class="info-epg">No information</div>
        </div>
    </div>

    <div id="tivi-menu">
        <div id="col-groups">
            <div class="col-header">گروپێن کەناڵان</div>
            <div class="list-container" id="groups-list"></div>
        </div>
        <div id="col-channels">
            <div class="col-header" id="current-group-title">هەمی</div>
            <div class="list-container" id="channels-list"></div>
        </div>
    </div>
    
    <!-- لیستا هەلبژارتنان (Long Press) -->
    <div id="context-menu">
        <div class="ctx-item" id="ctx-move"><i class="fa fa-arrows-v"></i> ڤەگوهاستن</div>
        <div class="ctx-item" id="ctx-edit"><i class="fa fa-pencil"></i> دەستکاری کرن</div>
        <div class="ctx-item danger" id="ctx-delete"><i class="fa fa-trash"></i> مسح کرن</div>
        <div class="ctx-item" id="ctx-reset"><i class="fa fa-refresh"></i> ڤەگەڕاندنا بنەڕەت</div>
    </div>

    <!-- مۆدێلێ گۆڕینێ -->
    <div id="edit-modal">
        <h3 id="modal-title">سەردێڕ</h3>
        <input type="text" id="modal-input" placeholder="...">
        <div class="modal-btns">
            <button class="modal-btn btn-save" id="btn-save">پاراستن</button>
            <button class="modal-btn btn-cancel" id="btn-cancel">هەلوەشاندن</button>
        </div>
    </div>

    <div id="toast"></div>
</div>

<script>
    const CHANNELS_URL = "https://raw.githubusercontent.com/stvplus1/STV-Plus-/refs/heads/main/channels.json";
    
    let allChannels = [];
    let groups = ["هەمی", "دڵخواز", "کوردستان", "تورکی", "عەرەبی", "ئاینی", "زاروک", "وەرزشی", "OSN"];
    let filteredChannels = [];
    
    let isMenuOpen = false;
    let showGroups = false;
    let activeColumn = 'channels';
    
    let selGroupIndex = 0;
    let selChannelIndex = 0;
    let playGroupIndex = 0;
    let playChannelIndex = -1;
    let currentPlayingChannel = null;

    let uiTimer, reconnectTimer, numTimer, stallTimer;
    let typedNumber = "";
    window.shakaPlayer = null;
    let favChannels = JSON.parse(localStorage.getItem('favChannels')) || [];

    // گۆڕاوێن تایبەت ب دەستکاری کرنێ (Edit Mode)
    let pressTimer = null;
    let isHoldingOk = false;
    let isCtxOpen = false;
    let ctxIndex = 0;
    const ctxOptions = ['move', 'edit', 'delete', 'reset'];
    
    let isModalOpen = false;
    let modalMode = ''; 
    let modalBtnIndex = 0; // 0 = save, 1 = cancel

    const videoElement = document.getElementById('main-video');

    function triggerAutoReconnect() {
        if (reconnectTimer) return; 
        
        document.getElementById('loader').style.display = 'block';
        reconnectTimer = setTimeout(() => {
            reconnectTimer = null;
            if (currentPlayingChannel) {
                playChannel(currentPlayingChannel, playChannelIndex);
            }
        }, 3000);
    }

    videoElement.onerror = () => triggerAutoReconnect();
    videoElement.onstalled = () => triggerAutoReconnect();
    videoElement.onwaiting = () => {
        clearTimeout(stallTimer);
        stallTimer = setTimeout(() => {
            triggerAutoReconnect();
        }, 5000);
    };
    videoElement.onplaying = () => {
        clearTimeout(stallTimer);
        clearTimeout(reconnectTimer);
        reconnectTimer = null;
        document.getElementById('loader').style.display = 'none';
    };

    async function initApp() {
        try {
            // پشکنین ئەگەر لیستەکا دەستکاریکری هەبیت ل ئامێرێ بکارینەری
            let customCh = localStorage.getItem('custom_channels');
            if (customCh) {
                allChannels = JSON.parse(customCh);
            } else {
                let res = await fetch(CHANNELS_URL + '?t=' + Date.now());
                allChannels = await res.json();
            }
            
            updateFilteredChannels();
            
            if (allChannels.length > 0) {
                let lastChId = localStorage.getItem('last_channel_id');
                let targetIdx = 0;
                
                if (lastChId) {
                    let foundIdx = filteredChannels.findIndex((c, i) => (c.id ? c.id == lastChId : (allChannels.indexOf(c) + 1) == lastChId));
                    if (foundIdx !== -1) targetIdx = foundIdx;
                }
                
                selChannelIndex = targetIdx;
                playChannel(filteredChannels[targetIdx], targetIdx);
            }
        } catch (e) {
            showToast("کێشە د هێنانا کەنالان دا هەیە");
        }
    }

    function updateFilteredChannels() {
        let gName = groups[selGroupIndex];
        document.getElementById('current-group-title').innerText = gName;
        
        if (gName === "هەمی") {
            filteredChannels = allChannels;
        } else if (gName === "دڵخواز") {
            filteredChannels = allChannels.filter(c => favChannels.includes(c.id));
        } else {
            filteredChannels = allChannels.filter(c => c.group === gName);
        }
        
        if(!isMenuOpen) {
            selChannelIndex = filteredChannels.findIndex(c => currentPlayingChannel && c.id === currentPlayingChannel.id);
            if(selChannelIndex === -1) selChannelIndex = 0;
        } else if (activeColumn === 'groups') {
            selChannelIndex = 0;
        }
    }

    function renderGroups() {
        const list = document.getElementById('groups-list');
        list.innerHTML = '';
        groups.forEach((g, idx) => {
            let div = document.createElement('div');
            let isFocused = (activeColumn === 'groups' && idx === selGroupIndex);
            let isSelected = (activeColumn === 'channels' && idx === selGroupIndex);
            
            div.className = `group-item ${isFocused ? 'focused' : ''} ${isSelected ? 'selected' : ''}`;
            div.id = 'grp-' + idx;
            div.innerHTML = `<span>${g}</span>`;
            div.onclick = () => { 
                selGroupIndex = idx; 
                showGroups = false; 
                activeColumn = 'channels'; 
                updateFilteredChannels(); 
                updateMenuClasses();
                renderGroups(); 
                renderChannels();
            };
            list.appendChild(div);
        });
        scrollToItem('grp-' + selGroupIndex);
    }

    function renderChannels() {
        const list = document.getElementById('channels-list');
        list.innerHTML = '';
        
        if (filteredChannels.length === 0) {
            list.innerHTML = `<div style="padding: 20px; color: #888; text-align: center;">هیچ کەناڵێک نییە</div>`;
            return;
        }

        filteredChannels.forEach((ch, idx) => {
            let div = document.createElement('div');
            let isFocused = (activeColumn === 'channels' && idx === selChannelIndex);
            let isSelected = (activeColumn === 'groups' && idx === selChannelIndex);
            let isPlaying = (currentPlayingChannel && currentPlayingChannel.id === ch.id);
            
            let displayNum = ch.id || (allChannels.indexOf(ch) + 1);

            div.className = `ch-item ${isFocused ? 'focused' : ''} ${isSelected ? 'selected' : ''} ${isPlaying ? 'playing' : ''}`;
            div.id = 'ch-' + idx;
            div.innerHTML = `
                <div class="ch-num">${displayNum}</div>
                <img class="ch-logo" src="${ch.logo}" onerror="this.src='https://via.placeholder.com/40'">
                <div class="ch-info">
                    <div class="ch-name">${ch.name}</div>
                    <div class="ch-epg">No information</div>
                </div>
            `;
            
            // کرتەکرنا ئاسایی ب مۆسکێ
            div.onclick = () => { 
                if(isCtxOpen || isModalOpen) return;
                activeColumn = 'channels';
                selChannelIndex = idx;
                playChannel(ch, idx); 
                toggleMenu(false); 
            };
            list.appendChild(div);
        });
        scrollToItem('ch-' + selChannelIndex);
    }

    function scrollToItem(id) {
        const el = document.getElementById(id);
        if (el) el.scrollIntoView({ block: 'center', behavior: 'auto' });
    }

    function showInfoBar(ch) {
        if(ch) {
            document.getElementById('ib-num').innerText = ch.id || (allChannels.indexOf(ch) + 1);
            document.getElementById('ib-name').innerText = ch.name;
            document.getElementById('ib-logo').src = ch.logo;
        }
        
        const bar = document.getElementById('info-bar');
        bar.classList.add('show');
        clearTimeout(uiTimer);
        uiTimer = setTimeout(() => {
            if (!isMenuOpen) bar.classList.remove('show');
        }, 5000); 
    }

    function toggleMenu(force, withGroups = false) {
        isMenuOpen = force !== undefined ? force : !isMenuOpen;
        const infoBar = document.getElementById('info-bar');
        
        if (isMenuOpen) {
            showGroups = withGroups;
            activeColumn = showGroups ? 'groups' : 'channels';
            updateMenuClasses();
            
            infoBar.classList.remove('show');
            selGroupIndex = playGroupIndex;
            updateFilteredChannels();
            selChannelIndex = playChannelIndex !== -1 ? playChannelIndex : 0;
            
            renderGroups();
            renderChannels();
        } else {
            updateMenuClasses();
            showInfoBar(currentPlayingChannel); 
        }
    }

    function updateMenuClasses() {
        const menu = document.getElementById('tivi-menu');
        if (isMenuOpen) {
            menu.classList.add('open');
            if (showGroups) menu.classList.add('show-groups');
            else menu.classList.remove('show-groups');
        } else {
            menu.classList.remove('open');
        }
    }

    function playChannel(ch, indexInFiltered) {
        if (!ch) return;
        currentPlayingChannel = ch;
        playGroupIndex = selGroupIndex;
        playChannelIndex = indexInFiltered;
        
        clearTimeout(reconnectTimer);
        clearTimeout(stallTimer);
        reconnectTimer = null;

        let channelIdToSave = ch.id ? ch.id : (allChannels.indexOf(ch) + 1);
        localStorage.setItem('last_channel_id', channelIdToSave);

        showInfoBar(ch);
        if(isMenuOpen) renderChannels(); 

        const loader = document.getElementById('loader');
        const videoContainer = document.getElementById('videoContainer');

        loader.style.display = 'block';

        if (window.shakaPlayer) {
            window.shakaPlayer.destroy();
            window.shakaPlayer = null;
        }

        if (ch.type !== 'dash') {
            videoContainer.style.display = 'none'; 
            if (window.AndroidPlayer) {
                window.AndroidPlayer.playStream(ch.url, ch.type || 'hls', ch.referer || "", ch.drmKeyId || "", ch.drmKey || "");
            } else {
                videoContainer.style.display = 'block';
                if (Hls.isSupported()) {
                    const hls = new Hls(); 
                    hls.loadSource(ch.url); 
                    hls.attachMedia(videoElement);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => videoElement.play().catch(() => triggerAutoReconnect()));
                    
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) {
                            triggerAutoReconnect();
                        }
                    });
                } else { 
                    videoElement.src = ch.url; 
                    videoElement.play().catch(() => triggerAutoReconnect()); 
                }
            }
            setTimeout(() => { loader.style.display = 'none'; }, 1500);
        } else {
            videoContainer.style.display = 'block'; 
            if (window.AndroidPlayer) {
                window.AndroidPlayer.playStream("about:blank", "hls", "", "", ""); 
            }
            shaka.polyfill.installAll();
            window.shakaPlayer = new shaka.Player(videoElement);
            
            window.shakaPlayer.addEventListener('error', () => triggerAutoReconnect());

            if (ch.drmKeyId && ch.drmKey) {
                window.shakaPlayer.configure({ drm: { clearKeys: { [ch.drmKeyId]: ch.drmKey } } });
            }
            window.shakaPlayer.load(ch.url).then(() => {
                videoElement.play().catch(() => triggerAutoReconnect()); 
                loader.style.display = 'none';
            }).catch(e => {
                loader.style.display = 'none';
                triggerAutoReconnect();
            });
        }
    }

    function handleNumberInput(digit) {
        clearTimeout(numTimer);
        typedNumber += digit;
        
        const ind = document.getElementById('num-indicator');
        ind.innerText = typedNumber;
        ind.style.display = 'block';
        
        numTimer = setTimeout(() => {
            let targetId = parseInt(typedNumber);
            typedNumber = "";
            ind.style.display = 'none';
            
            let globalIdx = allChannels.findIndex((c, i) => (c.id ? c.id == targetId : (i + 1) == targetId));
            
            if (globalIdx !== -1) {
                let foundCh = allChannels[globalIdx];
                selGroupIndex = groups.indexOf(foundCh.group) !== -1 ? groups.indexOf(foundCh.group) : 0;
                updateFilteredChannels();
                
                let filteredIdx = filteredChannels.findIndex((c, i) => (c.id ? c.id == targetId : (allChannels.indexOf(c) + 1) == targetId));
                if (filteredIdx !== -1) {
                    selChannelIndex = filteredIdx;
                    playChannel(foundCh, filteredIdx);
                }
            } else {
                showToast("کەناڵ نەهاتە دیتن");
            }
        }, 1200);
    }

    // ================= تایبەتمەندیێن Context Menu & Modal ================= //
    
    function saveChannelsToLocal() {
        // گۆڕینا هەمی IDـیان دا کو ل گەل ڕیزبەندییا نوێ بگونجن
        allChannels.forEach((c, idx) => c.id = idx + 1);
        localStorage.setItem('custom_channels', JSON.stringify(allChannels));
    }

    function openContextMenu() {
        isCtxOpen = true;
        ctxIndex = 0;
        updateCtxUI();
        document.getElementById('context-menu').classList.add('show');
    }

    function closeContextMenu() {
        isCtxOpen = false;
        document.getElementById('context-menu').classList.remove('show');
    }

    function updateCtxUI() {
        const items = document.querySelectorAll('.ctx-item');
        items.forEach((el, idx) => {
            if (idx === ctxIndex) el.classList.add('focused');
            else el.classList.remove('focused');
        });
    }

    function openModal(mode) {
        closeContextMenu();
        isModalOpen = true;
        modalMode = mode;
        modalBtnIndex = 0; // فوکس ل سەر دوگمەیا 'پاراستن' دکەت
        
        const targetCh = filteredChannels[selChannelIndex];
        const titleEl = document.getElementById('modal-title');
        const inputEl = document.getElementById('modal-input');
        
        if (mode === 'move') {
            titleEl.innerText = "ژمارەیا نوێ بنڤیسە بۆ ڤەگوهاستنێ";
            inputEl.type = "number";
            inputEl.value = targetCh.id || (allChannels.indexOf(targetCh) + 1);
        } else if (mode === 'edit') {
            titleEl.innerText = "ناڤێ نوێ یێ کەناڵی بنڤیسە";
            inputEl.type = "text";
            inputEl.value = targetCh.name;
        }
        
        updateModalUI();
        document.getElementById('edit-modal').classList.add('show');
        setTimeout(() => inputEl.focus(), 100);
    }

    function closeModal() {
        isModalOpen = false;
        document.getElementById('edit-modal').classList.remove('show');
    }

    function updateModalUI() {
        document.getElementById('btn-save').classList.toggle('focused', modalBtnIndex === 0);
        document.getElementById('btn-cancel').classList.toggle('focused', modalBtnIndex === 1);
    }

    function saveModal() {
        const val = document.getElementById('modal-input').value;
        const targetCh = filteredChannels[selChannelIndex];
        const globalIndex = allChannels.indexOf(targetCh);
        
        if (modalMode === 'move') {
            let newPos = parseInt(val);
            if (!isNaN(newPos) && newPos > 0) {
                allChannels.splice(globalIndex, 1);
                let insertIndex = Math.max(0, Math.min(newPos - 1, allChannels.length));
                allChannels.splice(insertIndex, 0, targetCh);
                showToast("کەناڵ هاتە ڤەگوهاستن");
            }
        } else if (modalMode === 'edit') {
            if (val.trim() !== '') {
                targetCh.name = val.trim();
                showToast("ناڤێ کەناڵی هاتە گۆڕین");
            }
        }
        
        saveChannelsToLocal();
        updateFilteredChannels();
        renderChannels();
        closeModal();
    }

    function deleteChannel() {
        const targetCh = filteredChannels[selChannelIndex];
        const globalIndex = allChannels.indexOf(targetCh);
        if (globalIndex > -1) {
            allChannels.splice(globalIndex, 1);
            saveChannelsToLocal();
            updateFilteredChannels();
            renderChannels();
            showToast("کەناڵ هاتە مسح کرن");
        }
        closeContextMenu();
    }

    async function resetChannels() {
        localStorage.removeItem('custom_channels');
        showToast("کەناڵ هاتنە ڤەگەڕاندن بۆ بنەڕەت");
        closeContextMenu();
        await initApp();
    }

    // ================= کۆنترۆلا کیبۆردی و دوگمەیان ================= //

    document.addEventListener('keydown', (e) => {
        const key = e.keyCode;
        const keyChar = e.key;
        
        // ١. کۆنترۆلا مۆدێلێ (پەنجەرەیا نڤیسینێ)
        if (isModalOpen) {
            if (key === 37 || key === 39) { // چەپ و ڕاست بۆ هەلبژارتنا دوگمەیان
                modalBtnIndex = modalBtnIndex === 0 ? 1 : 0;
                updateModalUI();
                e.preventDefault();
            } else if (key === 13) { // Enter
                if (modalBtnIndex === 0) saveModal();
                else closeModal();
                e.preventDefault();
            } else if ([8, 27, 461].includes(key)) { // Back
                closeModal();
                e.preventDefault();
            }
            return; 
        }

        // ٢. کۆنترۆلا Context Menu
        if (isCtxOpen) {
            if (key === 38) { // Up
                if (ctxIndex > 0) ctxIndex--;
                updateCtxUI();
                e.preventDefault();
            } else if (key === 40) { // Down
                if (ctxIndex < ctxOptions.length - 1) ctxIndex++;
                updateCtxUI();
                e.preventDefault();
            } else if (key === 13) { // Enter
                let action = ctxOptions[ctxIndex];
                if (action === 'move') openModal('move');
                else if (action === 'edit') openModal('edit');
                else if (action === 'delete') deleteChannel();
                else if (action === 'reset') resetChannels();
                e.preventDefault();
            } else if ([8, 27, 461, 37].includes(key)) { // Back / Left
                closeContextMenu();
                e.preventDefault();
            }
            return; 
        }

        if (/^\d$/.test(keyChar)) {
            handleNumberInput(keyChar);
            e.preventDefault();
            return;
        }

        // ٣. تایبەتمەندییا Long Press ل سەر دوگمەیا OK / Enter
        if (key === 13 && isMenuOpen && activeColumn === 'channels') {
            if (!e.repeat) {
                isHoldingOk = true;
                pressTimer = setTimeout(() => {
                    isHoldingOk = false;
                    openContextMenu();
                }, 2000); // پشتی ٢ چرکەیان مینو ڤەدبیت
            }
            e.preventDefault();
            return; 
        }

        if ([8, 27, 10009, 461].includes(key)) {
            if (isMenuOpen) { 
                if (showGroups) {
                    showGroups = false; activeColumn = 'channels';
                    updateMenuClasses(); renderGroups(); renderChannels();
                } else {
                    toggleMenu(false);
                }
                e.preventDefault(); return; 
            }
        }

        if (isMenuOpen) {
            e.preventDefault();
            if (activeColumn === 'channels') {
                switch(key) {
                    case 38:
                        if (selChannelIndex > 0) selChannelIndex--;
                        renderChannels(); break;
                    case 40:
                        if (selChannelIndex < filteredChannels.length - 1) selChannelIndex++;
                        renderChannels(); break;
                    case 37:
                        showGroups = true; activeColumn = 'groups'; 
                        updateMenuClasses(); renderGroups(); renderChannels(); break;
                    case 39:
                        toggleMenu(false); break;
                }
            } else if (activeColumn === 'groups') {
                switch(key) {
                    case 38:
                        if (selGroupIndex > 0) selGroupIndex--;
                        updateFilteredChannels(); renderGroups(); break;
                    case 40:
                        if (selGroupIndex < groups.length - 1) selGroupIndex++;
                        updateFilteredChannels(); renderGroups(); break;
                    case 39: 
                    case 13:
                        showGroups = false; activeColumn = 'channels'; 
                        updateMenuClasses(); renderGroups(); renderChannels(); break;
                    case 37:
                        toggleMenu(false); break;
                }
            }
        } else {
            if ([38, 40, 37, 39, 13].includes(key)) e.preventDefault();
            
            switch(key) {
                case 38: 
                    if (playChannelIndex < filteredChannels.length - 1) {
                        playChannel(filteredChannels[playChannelIndex + 1], playChannelIndex + 1);
                    }
                    break;
                case 40: 
                    if (playChannelIndex > 0) {
                        playChannel(filteredChannels[playChannelIndex - 1], playChannelIndex - 1);
                    }
                    break;
                case 37: 
                case 13: 
                    toggleMenu(true, false); break;
                case 39: 
                    showInfoBar(currentPlayingChannel); break;
            }
        }
    });

    // ٤. ئەگەر بەری ٢ چرکەیان پەنجە ڕاکرێت ل سەر دوگمەیا OK، دێ ب ئاسایی کەناڵی لێدەت
    document.addEventListener('keyup', (e) => {
        if (e.keyCode === 13 && isMenuOpen && activeColumn === 'channels' && !isCtxOpen && !isModalOpen) {
            if (isHoldingOk) { 
                clearTimeout(pressTimer);
                isHoldingOk = false;
                playChannel(filteredChannels[selChannelIndex], selChannelIndex);
                toggleMenu(false);
            }
        }
    });

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }

    initApp();

</script>
</body>
