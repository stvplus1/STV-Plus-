<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STv+ Movies</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        :root { --red: #e50914; --bg: #050505; --card: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #eee; overflow-x: hidden; padding-top: 130px; }

        .fixed-top { position: fixed; top: 0; width: 100%; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px); z-index: 1000; border-bottom: 1px solid #222; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 24px; font-weight: 800; color: white; display: flex; align-items: center; gap: 10px; }
        .logo span { color: var(--red); }
        .back-btn { background: rgba(255,255,255,0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .search-box { background: #1a1a1a; border: 1px solid #333; border-radius: 8px; padding: 6px 12px; display: flex; align-items: center; width: 180px; }
        .search-box input { background: none; border: none; color: white; outline: none; font-size: 13px; width: 100%; margin-right: 8px; }
        
        .categories-nav { display: flex; overflow-x: auto; padding: 10px 15px 15px; gap: 10px; scrollbar-width: none; }
        .categories-nav::-webkit-scrollbar { display: none; }
        .cat-item { background: #1a1a1a; color: #bbb; padding: 6px 18px; border-radius: 20px; font-size: 13px; cursor: pointer; white-space: nowrap; transition: 0.3s; border: 1px solid #333; text-transform: capitalize; }
        .cat-item.active { background: var(--red); color: white; border-color: var(--red); }
        
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .movie-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; position: relative; cursor: pointer; }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .movie-card .info { padding: 8px; font-size: 12px; text-align: center; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .loading { text-align: center; padding: 50px; grid-column: 1 / -1; color: #888; }

        @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(6, 1fr); } }
    </style>
</head>
<body>

    <div class="fixed-top">
        <header>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="back-btn" onclick="window.location.href='index.html'" title="زڤڕین"><i class="fas fa-arrow-right"></i></button>
                <div class="logo">STv+<span>MOVIES</span></div>
            </div>
            <div class="search-box">
                <i class="fas fa-search" style="color: #666;"></i>
                <input type="text" id="movieSearch" placeholder="لێگەریان...">
            </div>
        </header>

        <div class="categories-nav" id="categoryList">
            <span class="cat-item active" data-filter="all">هەمی</span>
        </div>
    </div>

    <div class="movie-grid" id="movieList">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> دئینیت...</div>
    </div>

    <script>
        $(document).ready(function() {
            const jsonUrl = "https://raw.githubusercontent.com/stvplus1/Hodber/refs/heads/main/m2.json"; 
            let allMovies = []; 

            fetch(jsonUrl)
                .then(response => response.json())
                .then(data => {
                    if(data && data.items) {
                        processJSON(data.items);
                    } else {
                        $('#movieList').html('<div class="loading">داتا د فایلێ دا نەهاتە دیتن.</div>');
                    }
                })
                .catch(error => {
                    console.error("Error fetching JSON:", error);
                    $('#movieList').html('<div class="loading">کێشە دئینانا فایلێ JSON دا هەیە.</div>');
                });

            function processJSON(items) {
                let groups = new Set();
                allMovies = []; 

                items.forEach((item, index) => {
                    let movieGroups = (item.keys && item.keys.length > 0) ? item.keys : ['others'];
                    movieGroups.forEach(g => { if(g) groups.add(g.toLowerCase()); });

                    allMovies.push({
                        id: item.id || index,
                        title: item.title || 'Unknown',
                        poster: item.poster || 'https://via.placeholder.com/200x300?text=No+Image',
                        url: item.url || '',
                        group: movieGroups.map(g => g.toLowerCase()).join(' '),
                        referer: item.referer || ''
                    });
                });
                renderData(allMovies, Array.from(groups).sort());
            }

            function renderData(movies, groups) {
                let catHtml = '<span class="cat-item active" data-filter="all">هەمی</span>';
                groups.forEach(group => {
                    catHtml += `<span class="cat-item" data-filter="${group}">${group}</span>`;
                });
                $('#categoryList').html(catHtml);

                let movieHtml = '';
                movies.forEach((movie, index) => {
                    movieHtml += `
                    <div class="movie-card" data-genre="${movie.group}" title="${movie.title}" onclick="playMovie(${index})">
                        <img src="${movie.poster}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                        <div class="info">${movie.title}</div>
                    </div>`;
                });
                $('#movieList').html(movieHtml);
            }

            $('#movieSearch').on('input', function() {
                var value = $(this).val().toLowerCase();
                $('.movie-card').each(function() {
                    var title = $(this).attr('title').toLowerCase();
                    $(this).toggle(title.indexOf(value) > -1);
                });
            });

            $(document).on('click', '.cat-item', function() {
                $('.cat-item').removeClass('active');
                $(this).addClass('active');
                var filter = $(this).attr('data-filter');

                if (filter === 'all') {
                    $('.movie-card').fadeIn(300);
                } else {
                    $('.movie-card').hide();
                    $('.movie-card').filter(function() {
                        var genres = $(this).attr('data-genre').split(' ');
                        return genres.includes(filter);
                    }).fadeIn(300);
                }
            });

            // ل ڤێرە فیلم دچتە ناو ExoPlayer یێ ئەندرۆیدێ
            window.playMovie = function(index) {
                const movie = allMovies[index];
                if (window.AndroidPlayer) {
                    // هنارتنا لینک و ڕەفەرێ بۆ ExoPlayer
                    window.AndroidPlayer.playStream(movie.url, 'hls', movie.referer || "", "", "");
                } else {
                    // ئەگەر ل مۆبایلا ئاسایی (Browser) تاقی بکەی دێ ویدیو لەسەر وێبگەری ڤەکەت
                    window.location.href = movie.url;
                }
            };
        });
    </script>
</body>
</html>
