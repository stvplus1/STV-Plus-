<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STv+ Movies</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        /* بەشێ گەڕیانێ و فلتەران ل سەرڤە */
        .top-bar {
            position: sticky;
            top: 0;
            background-color: #000000;
            z-index: 100;
            padding-top: 10px;
        }

        .header-title {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 15px 10px 15px;
            font-size: 22px;
            font-weight: bold;
        }

        .header-title span {
            color: #e50914; /* ڕەنگێ سۆر یێ STv+ */
        }

        .categories-container {
            display: flex;
            overflow-x: auto;
            padding: 5px 10px 15px 10px;
            gap: 8px;
            direction: ltr; /* بۆ جووڵانا ئاسان یا دوگمەیان */
        }

        .categories-container::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            background-color: #1a1a1a;
            color: #ffffff;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            cursor: pointer;
        }

        .cat-btn.active {
            background-color: #e50914;
        }

        /* لیستا فیلمان (3 ستوون وەکی ڤیدیۆیێ) */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            padding: 10px;
            padding-bottom: 40px;
        }

        .movie-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s ease;
        }

        .movie-card:active {
            transform: scale(0.93);
        }

        .movie-poster {
            width: 100%;
            aspect-ratio: 2 / 3;
            border-radius: 8px;
            object-fit: cover;
            background-color: #1a1a1a;
        }

        .movie-title {
            margin-top: 6px;
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #e0e0e0;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="header-title">STv+<span>MOVIES</span></div>
        <div class="categories-container">
            <button class="cat-btn active">هەمی</button>
            <button class="cat-btn">Action</button>
            <button class="cat-btn">Adventure</button>
            <button class="cat-btn">Animation</button>
        </div>
    </div>

    <!-- گریدێ فیلمان -->
    <div class="movie-grid">
        
        <!-- ل ژێر فەنکشنا playMovie لینکا سێرڤەرێ خۆ یان فایلی دابنێ -->
        <div class="movie-card" onclick="playMovie('http://example.com/video1.m3u8')">
            <img class="movie-poster" src="https://image.tmdb.org/t/p/w500/A0x8EXLnyVInaE1mPz0XfR0hL9p.jpg" alt="Scarlet">
            <div class="movie-title">Scarlet</div>
        </div>

        <div class="movie-card" onclick="playMovie('http://example.com/video2.mp4')">
            <img class="movie-poster" src="https://image.tmdb.org/t/p/w500/5kIGw1rEInWw1sO3tL05Q5H14K8.jpg" alt="The Favor">
            <div class="movie-title">The Favor</div>
        </div>

        <div class="movie-card" onclick="playMovie('http://example.com/video3.m3u8')">
            <img class="movie-poster" src="https://image.tmdb.org/t/p/w500/xS14q3dZt541e2LgC7i4J0g1G1.jpg" alt="Grow">
            <div class="movie-title">Grow</div>
        </div>

    </div>

    <script>
        function playMovie(url) {
            // ئەگەر ئەپێ ئاندرۆیدێ یێ چالاک بیت
            if (window.AndroidPlayer && typeof window.AndroidPlayer.openMedia === "function") {
                window.AndroidPlayer.openMedia(url);
            } else {
                console.log("ل سەر وێبگەری هاتە لێدان: " + url);
            }
        }
    </script>
</body>
</html>
