<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STv+ Movies Pro</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --red: #ff0000; --bg: #050505; --card: #121212; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: var(--bg); color: #eee; overflow-x: hidden; }

        /* بەشێ لیستا فلیمان */
        #movies-container { padding-top: 130px; transition: 0.3s; }

        /* Header fixed */
        .fixed-top {
            position: fixed; top: 0; width: 100%;
            background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(10px);
            z-index: 1000; border-bottom: 1px solid #222;
        }

        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo { font-size: 24px; font-weight: 800; color: white; }
        .logo span { color: var(--red); }

        .search-box {
            background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
            padding: 6px 12px; display: flex; align-items: center; width: 180px;
        }
        .search-box input {
            background: none; border: none; color: white; outline: none;
            font-size: 13px; width: 100%; margin-right: 8px;
        }

        /* Categories */
        .categories-nav {
            display: flex; overflow-x: auto; padding: 10px 15px 15px;
            gap: 10px; scrollbar-width: none;
        }
        .categories-nav::-webkit-scrollbar { display: none; }

        .cat-item {
            background: #1a1a1a; color: #bbb; padding: 6px 18px;
            border-radius: 20px; font-size: 13px; cursor: pointer;
            white-space: nowrap; transition: 0.3s; border: 1px solid #333;
            text-transform: capitalize;
        }
        .cat-item.active { background: var(--red); color: white; border-color: var(--red); }

        /* Movie Grid */
        .movie-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .movie-card {
            background: var(--card); border-radius: 12px; overflow: hidden;
            border: 1px solid #222; transition: 0.3s; position: relative; cursor: pointer;
        }
        .movie-card:hover, .movie-card:focus { border-color: var(--red); transform: scale(1.02); }
        .movie-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
        .movie-card .info {
            padding: 8px; font-size: 12px; text-align: center;
            font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        
        .loading { text-align: center; padding: 50px; grid-column: 1 / -1; color: #888; }

        @media (min-width: 768px) { .movie-grid { grid-template-columns: repeat(6, 1fr); } }

        /* پەیاما ئاگادارکرنێ */
        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.95); color: white; padding: 10px 25px;
            border-radius: 8px; font-weight: bold; font-size: 14px;
            z-index: 9999; opacity: 0; transition: 0.3s; pointer-events: none;
        }
        #toast.show { opacity: 1; }

        /* بەشێ پلەیەرێ ئەندرۆیدێ (Overlay) */
        #player-container {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent; z-index: 9000;
        }
        
        .back-btn {
            position: absolute; top: 30px; left: 30px; background: rgba(0,0,0,0.7);
            color: white; border: 2px solid rgba(255,255,255,0.2); padding: 10px 25px;
            border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold;
            display: flex; align-items: center; gap: 10px; transition: 0.2s; z-index: 9001;
            direction: ltr;
        }
        .back-btn:hover, .back-btn:focus { background: var(--red); border-color: var(--red); outline: none; }
    </style>
</head>
<body>

    <div id="toast"></div>

    <!-- بەشێ سەرەکی یێ لیستا فلیمان -->
    <div id="movies-container">
        <div class="fixed-top">
            <header>
                <div class="logo">DNA<span>MOVIES</span></div>
                <div class="search-box">
                    <i class="fas fa-search" style="color: #666;"></i>
                    <input type="text" id="movieSearch" placeholder="لێگەریان...">
                </div>
            </header>

            <div class="categories-nav" id="categoryList">
                <span class="cat-item active" data-filter="all">هەمی</span>
            </div>
        </div>

        <div class="movie-grid" id="movieList">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> دئینیت...</div>
        </div>
    </div>

    <!-- بەشێ کۆنترۆلا پلەیەری ل دەمێ کارپێکرنێ -->
    <div id="player-container">
        <button class="back-btn" onclick="closeMovie()" id="btnBack">
            <i class="fas fa-arrow-left"></i> ڤەگەڕان
        </button>
    </div>

    <script>
        $(document).ready(function() {
            const jsonUrl = "https://raw.githubusercontent.com/stvplus1/Hodber/refs/heads/main/m2.json"; 

            fetch(jsonUrl)
                .then(response => response.json())
                .then(data => {
                    if(data && data.items) {
                        processJSON(data.items);
                    } else {
                        $('#movieList').html('<div class="loading">داتا د فایلێ دا نەهاتە دیتن.</div>');
                    }
                })
                .catch(error => {
                    $('#movieList').html('<div class="loading">کێشە دئینانا فایلێ JSON دا هەیە.</div>');
                });

            function processJSON(items) {
                let movies = [];
                let groups = new Set();

                items.forEach(item => {
                    let movieGroups = (item.keys && item.keys.length > 0) ? item.keys : ['others'];
                    movieGroups.forEach(g => { if(g) groups.add(g.toLowerCase()); });

                    movies.push({
                        title: item.title || 'Unknown',
                        poster: item.poster || 'https://via.placeholder.com/200x300?text=No+Image',
                        url: item.url || '#',
                        referer: item.referer || '',
                        group: movieGroups.map(g => g.toLowerCase()).join(' ')
                    });
                });

                renderData(movies, Array.from(groups).sort());
            }

            function renderData(movies, groups) {
                let catHtml = '<span class="cat-item active" data-filter="all">هەمی</span>';
                groups.forEach(group => {
                    catHtml += `<span class="cat-item" data-filter="${group}">${group}</span>`;
                });
                $('#categoryList').html(catHtml);

                let movieHtml = '';
                movies.forEach(movie => {
                    movieHtml += `
                    <div class="movie-card" tabindex="0" data-genre="${movie.group}" data-url="${movie.url}" data-referer="${movie.referer}" title="${movie.title}" onclick="openMovie(this)">
                        <img src="${movie.poster}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Image'">
                        <div class="info">${movie.title}</div>
                    </div>`;
                });
                $('#movieList').html(movieHtml);
            }

            $('#movieSearch').on('input', function() {
                var value = $(this).val().toLowerCase();
                $('.movie-card').each(function() {
                    var title = $(this).attr('title').toLowerCase();
                    $(this).toggle(title.indexOf(value) > -1);
                });
            });

            $(document).on('click', '.cat-item', function() {
                $('.cat-item').removeClass('active');
                $(this).addClass('active');

                var filter = $(this).attr('data-filter');

                if (filter === 'all') {
                    $('.movie-card').fadeIn(300);
                } else {
                    $('.movie-card').hide();
                    $('.movie-card').filter(function() {
                        var genres = $(this).attr('data-genre').split(' ');
                        return genres.includes(filter);
                    }).fadeIn(300);
                }
            });

            // فەنکشنا ڤەکرنا فلیمی و شاردنەڤەیا لیستان
            window.openMovie = function(el) {
                let url = el.getAttribute('data-url');
                let referer = el.getAttribute('data-referer') || "";
                let title = el.getAttribute('title') || "";
                
                // پەیاما ئاگادارکرنێ
                let toast = document.getElementById('toast');
                toast.innerText = "لێدانا: " + title;
                toast.classList.add('show');
                setTimeout(() => { toast.classList.remove('show'); }, 3000);

                // **ئەڤەیە چارەسەریا سەرەکی:** شاردنەڤەیا لیستێ و شەفافکرنا باکگراوەندی
                document.body.style.background = "transparent";
                document.getElementById('movies-container').style.display = "none";
                document.getElementById('player-container').style.display = "block";
                document.getElementById('btnBack').focus(); // فۆکەسکرنا دوگمەیا ڤەگەڕانێ

                // دیارکرنا جۆرێ ڤیدیۆیێ بۆ ئەندرۆید پلەیەری
                let type = url.includes('.m3u8') ? 'hls' : '';

                if (window.AndroidPlayer && window.AndroidPlayer.playStream) {
                    window.AndroidPlayer.playStream(url, type, referer, "", "");
                } else {
                    // ئەگەر ل وێبگەرێ بوو، پلەیەرەکێ سادە دئینیتە سەر شاشەیێ
                    let pc = document.getElementById('player-container');
                    if(!document.getElementById('html-player')) {
                        pc.innerHTML += `<video id="html-player" src="${url}" controls autoplay style="width:100%; height:100%; position:absolute; top:0; left:0; z-index:-1;"></video>`;
                    }
                }
            };

            // فەنکشنا گرتنا فلیمی و زڤڕینەڤە بۆ لیستێ
            window.closeMovie = function() {
                if (window.AndroidPlayer && window.AndroidPlayer.playStream) {
                    window.AndroidPlayer.playStream("about:blank", "hls", "", "", ""); // ڕاگرتنا ڤیدیۆیێ
                }
                let htmlPlayer = document.getElementById('html-player');
                if (htmlPlayer) htmlPlayer.remove();

                // زڤڕاندنەڤەیا ڕەنگ و لیستا فلیمان
                document.body.style.background = "var(--bg)";
                document.getElementById('movies-container').style.display = "block";
                document.getElementById('player-container').style.display = "none";
            };

            // کۆنترۆلا دوگمەیا 'Back' یا کۆنترۆلێ (بۆ تیڤی بۆکسێ)
            document.addEventListener('keydown', function(e) {
                if ([8, 27, 10009, 461].includes(e.keyCode)) {
                    if (document.getElementById('player-container').style.display === 'block') {
                        closeMovie();
                        e.preventDefault(); // نەهێلە ژ بەرنامەی دەرکەڤیت
                    }
                }
            });
        });
    </script>
</body>
</html>
