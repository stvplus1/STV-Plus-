name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # دابەزاندن و ڕێکخستنا ڤێرژنا دروست یا Gradle کو ل گەل پرۆژەی بگونجیت
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.2'

    - name: Generate Missing Gradle Files
      run: |
        echo "pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }" > settings.gradle
        echo "dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }" >> settings.gradle
        echo "rootProject.name = 'STvPlusPlayer'" >> settings.gradle
        echo "include ':app'" >> settings.gradle
        echo "plugins { id 'com.android.application' version '8.1.0' apply false }" > build.gradle
        echo "android.useAndroidX=true" > gradle.properties

    # کارپێکرنا Gradle ب شێوەیەکێ ڕاستەوخۆ بێی پێدڤیبوون ب فایلی gradlew
    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: STv-Plus-App
        path: app/build/outputs/apk/debug/app-debug.apk
